name: Publish to Flight Log
description: Publish a post to the No Pilots Flight Log via WPGraphQL, then refine it.

inputs:
  title:
    description: Post title (no category prefix — let WordPress handle that)
    required: true
  content:
    description: Post content as HTML
    required: true
  category-slug:
    description: WordPress category slug (e.g., flight-log, preflight-review)
    required: true
  refine-prompt:
    description: Category-specific refinement instructions for the copy editor
    required: true
  wp-url:
    description: WordPress site URL
    required: true
  wp-auth:
    description: WordPress application password (user:pass)
    required: true
  github-token:
    description: GitHub token for Models API access
    required: true
  excerpt:
    description: Short summary for homepage/feed display
    required: true
  author-slug:
    description: WordPress author username (e.g., pat, doc, dalton, autopilot)
    required: false
    default: ''
  skip-refinement:
    description: Skip the post refinement step
    required: false
    default: 'false'

outputs:
  post-id:
    description: Published post GraphQL ID
    value: ${{ steps.publish.outputs.post-id }}
  post-link:
    description: Published post URL
    value: ${{ steps.publish.outputs.post-link }}

runs:
  using: composite
  steps:
    - name: Publish and refine
      id: publish
      uses: actions/github-script@v7
      env:
        WP_URL: ${{ inputs.wp-url }}
        WP_AUTH: ${{ inputs.wp-auth }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        POST_TITLE: ${{ inputs.title }}
        POST_CONTENT: ${{ inputs.content }}
        CATEGORY_SLUG: ${{ inputs.category-slug }}
        REFINE_PROMPT: ${{ inputs.refine-prompt }}
        POST_EXCERPT: ${{ inputs.excerpt }}
        AUTHOR_SLUG: ${{ inputs.author-slug }}
        SKIP_REFINEMENT: ${{ inputs.skip-refinement }}
      with:
        script: |
          const wpUrl = process.env.WP_URL;
          const wpAuth = process.env.WP_AUTH;

          const wpGraphQL = async (query, variables = {}) => {
            const res = await fetch(`${wpUrl}/graphql`, {
              method: 'POST',
              headers: {
                'Authorization': `Basic ${Buffer.from(wpAuth).toString('base64')}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ query, variables }),
            });
            if (!res.ok) {
              const text = await res.text();
              throw new Error(`WPGraphQL HTTP ${res.status}: ${text}`);
            }
            const json = await res.json();
            if (json.errors) {
              throw new Error(`WPGraphQL error: ${JSON.stringify(json.errors)}`);
            }
            return json.data;
          };

          // Find author
          let authorId = null;
          const authorSlug = process.env.AUTHOR_SLUG;
          if (authorSlug) {
            try {
              // Try WPGraphQL first (works for users with published posts)
              const usersResult = await wpGraphQL(
                `{ users(first: 100) { nodes { slug id } } }`
              );
              const match = usersResult.users?.nodes?.find(u => u.slug === authorSlug);
              authorId = match?.id || null;

              // Fallback to REST API for users with no posts yet
              if (!authorId) {
                const restRes = await fetch(`${wpUrl}/wp-json/wp/v2/users?slug=${authorSlug}&per_page=1`, {
                  headers: { 'Authorization': `Basic ${Buffer.from(wpAuth).toString('base64')}` },
                });
                if (restRes.ok) {
                  const users = await restRes.json();
                  if (Array.isArray(users) && users.length > 0) {
                    authorId = Buffer.from(`user:${users[0].id}`).toString('base64');
                  }
                }
              }

              if (authorId) {
                core.info(`Author: ${authorSlug}`);
              } else {
                core.warning(`Author "${authorSlug}" not found — publishing as default user.`);
              }
            } catch (e) {
              core.warning(`Author lookup failed: ${e.message}`);
            }
          }

          // Find category
          const slug = process.env.CATEGORY_SLUG;
          const catResult = await wpGraphQL(
            `query($slug: [String]) { categories(where: { slug: $slug }) { nodes { id } } }`,
            { slug: [slug] }
          );
          const categoryId = catResult.categories?.nodes?.[0]?.id || null;
          if (!categoryId) core.warning(`Category "${slug}" not found — publishing without category.`);

          // Publish (with author fallback)
          const postVars = {
            title: process.env.POST_TITLE,
            content: process.env.POST_CONTENT,
            excerpt: process.env.POST_EXCERPT,
            status: 'PUBLISH',
            ...(categoryId && { categories: { append: true, nodes: [{ id: categoryId }] } }),
            ...(authorId && { authorId }),
          };

          const mutation = `mutation CreatePost($title: String!, $content: String!, $excerpt: String, $status: PostStatusEnum!, $categories: PostCategoriesInput, $authorId: ID) {
            createPost(input: { title: $title, content: $content, excerpt: $excerpt, status: $status, categories: $categories, authorId: $authorId }) {
              post { id uri link }
            }
          }`;

          let data;
          try {
            data = await wpGraphQL(mutation, postVars);
          } catch (e) {
            if (authorId && e.message.includes('not allowed')) {
              core.warning(`Cannot publish as "${process.env.AUTHOR_SLUG}" — retrying as default user.`);
              delete postVars.authorId;
              data = await wpGraphQL(mutation, postVars);
            } else {
              throw e;
            }
          }

          const postId = data.createPost.post.id;
          const postLink = data.createPost.post.link;
          core.setOutput('post-id', postId);
          core.setOutput('post-link', postLink);
          core.info(`Published: ${postLink}`);

          // Refine
          if (process.env.SKIP_REFINEMENT !== 'true') {
          try {
            const postData = await wpGraphQL(
              `query($id: ID!) { post(id: $id, idType: ID) { title content } }`,
              { id: postId }
            );
            const postContent = postData.post?.content || '';

            const refineRes = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: 'openai/gpt-4o-mini',
                messages: [{
                  role: 'system',
                  content: 'You are a copy editor for "No Pilots" — dispatches from an autonomous AI-governed WordPress project. Voice: direct, technical, no filler. Kill any AI slop — no "we are excited," no "we are pleased," no "in conclusion," no "as we continue." Start with what matters. Posts should be concise, well-structured HTML, and only show what is necessary. IMPORTANT: Output raw HTML only. No markdown code fences. No explanation. Just the HTML.',
                }, {
                  role: 'user',
                  content: `${process.env.REFINE_PROMPT}\n\nIf the post is already good, reply with exactly: NO_CHANGES\n\nOtherwise reply with ONLY the refined HTML. No markdown, no code fences, no explanation.\n\nCurrent content:\n${postContent.substring(0, 3000)}`,
                }],
                max_tokens: 1000,
                temperature: 0.3,
              }),
            });

            if (refineRes.ok) {
              const refineResult = await refineRes.json();
              let refined = refineResult.choices?.[0]?.message?.content || '';
              // Strip markdown artifacts from model output
              refined = refined
                .replace(/^```html?\n?/i, '').replace(/\n?```$/g, '')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .trim();
              if (refined && !refined.includes('NO_CHANGES')) {
                await wpGraphQL(
                  `mutation($id: ID!, $content: String!) {
                    updatePost(input: { id: $id, content: $content }) { post { id } }
                  }`,
                  { id: postId, content: refined }
                );
                core.info('Post refined.');
              } else {
                core.info('Post quality: good, no refinement needed.');
              }
            }
          } catch (qErr) {
            core.warning(`Post refinement failed: ${qErr.message}`);
          }
          } else {
            core.info('Refinement skipped.');
          }

    - name: Report publish failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          const { data: existing } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            per_page: 50,
          });
          const title = '[Flight Log] Publish failure';
          if (existing.some(i => i.title === title)) return;

          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title,
            body: [
              'The Flight Log composite action failed to publish a post.',
              '',
              `**Workflow:** ${context.workflow}`,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Title:** ${process.env.POST_TITLE || 'unknown'}`,
              `**Category:** ${process.env.CATEGORY_SLUG || 'unknown'}`,
              `**Author:** ${process.env.AUTHOR_SLUG || 'unknown'}`,
              '',
              'Investigate the run logs and fix the root cause.',
            ].join('\n'),
            labels: ['agent', 'status:triage'],
          });
