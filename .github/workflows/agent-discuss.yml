name: Agent Discuss

on:
  discussion:
    types: [created, commented]
  workflow_dispatch:
    inputs:
      discussion_number:
        description: 'Discussion number to process'
        required: true

permissions:
  discussions: write
  issues: write
  contents: read
  models: read

concurrency:
  group: agent-discuss-${{ github.event.discussion.number || github.event.inputs.discussion_number }}
  cancel-in-progress: false

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run persona discussion
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_AUTH: ${{ secrets.WP_AUTH }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            // Get discussion number
            const discussionNumber = context.payload.discussion?.number
              || parseInt(context.payload.inputs?.discussion_number);

            if (!discussionNumber) {
              core.info('No discussion number found.');
              return;
            }

            // Get discussion details and comments via GraphQL
            const discussionResult = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  discussion(number: $number) {
                    id
                    title
                    body
                    category { name }
                    comments(first: 100) {
                      nodes {
                        body
                        author { login }
                      }
                    }
                  }
                }
              }
            `, { owner, repo, number: discussionNumber });

            const discussion = discussionResult.repository.discussion;
            if (!discussion) {
              core.info('Discussion not found.');
              return;
            }

            // Only respond to Proposals and Governance categories
            const category = discussion.category.name;
            if (!['Proposals', 'Governance'].includes(category)) {
              core.info(`Skipping category: ${category}`);
              return;
            }

            const comments = discussion.comments.nodes;

            // Known persona bots — skip if last comment was from one of ours
            const personaBots = ['github-actions[bot]', 'github-actions', 'nopilots-doc[bot]', 'nopilots-dalton[bot]', 'nopilots-pat[bot]'];

            // Persona order
            const personas = ['doc', 'dalton'];
            const decider = 'pat';

            // Count rounds from persona comments
            const personaComments = comments.filter(c =>
              c.body.startsWith('**Doc**') ||
              c.body.startsWith('**Dalton**') ||
              c.body.startsWith('**Pat**')
            );

            const round = Math.floor(personaComments.length / 2) + 1;
            const positionInRound = personaComments.length % 2;

            // Max 8 rounds
            if (round > 8) {
              core.info('Max rounds reached.');
              return;
            }

            // If Captain already spoke, we're done
            if (personaComments.some(c => c.body.startsWith('**Pat**'))) {
              core.info('Pat has decided. Discussion complete.');
              return;
            }

            // Determine if it's time for Pat (decider) or next persona
            let currentPersona;
            if (personaComments.length > 0 && positionInRound === 0 && round > 1) {
              // End of a full round — check consensus
              const lastRound = personaComments.slice(-2).map(c => c.body.toLowerCase());
              const supportSignals = ['agree', 'approve', 'support', 'looks good', 'no concerns', 'in favor'];
              const blockSignals = ['disagree', 'concern', 'block', 'oppose', 'reject', 'risk'];

              let supports = 0;
              for (const comment of lastRound) {
                const hasSupport = supportSignals.some(s => comment.includes(s));
                const hasBlock = blockSignals.some(s => comment.includes(s));
                if (hasSupport && !hasBlock) supports++;
              }

              if (supports >= 2 || round >= 8) {
                currentPersona = decider;
              } else {
                currentPersona = personas[0];
              }
            } else if (positionInRound < 2) {
              currentPersona = personas[positionInRound];
            } else {
              currentPersona = decider;
            }

            // Read persona prompt
            const promptPath = `.github/agent-personas/${currentPersona}.md`;
            let systemPrompt;
            try {
              systemPrompt = fs.readFileSync(promptPath, 'utf8');
            } catch (e) {
              core.warning(`Could not read ${promptPath}`);
              return;
            }

            // Build conversation context
            const conversationHistory = [
              `# Discussion: ${discussion.title}`,
              '',
              discussion.body,
              '',
              '---',
              '',
              ...comments.map(c => c.body),
            ].join('\n');

            // Call GitHub Models API
            const modelResponse = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: 'openai/gpt-4o-mini',
                messages: [
                  { role: 'system', content: systemPrompt },
                  { role: 'user', content: `Here is the discussion so far. Respond in character with your perspective.\n\n${conversationHistory}` },
                ],
                max_tokens: 800,
                temperature: 0.7,
              }),
            });

            if (!modelResponse.ok) {
              const err = await modelResponse.text();
              core.warning(`Models API error: ${err}`);
              return;
            }

            const result = await modelResponse.json();
            const reply = result.choices?.[0]?.message?.content;

            if (!reply) {
              core.warning('No response from model.');
              return;
            }

            // Post comment to discussion
            const addCommentResult = await github.graphql(`
              mutation($discussionId: ID!, $body: String!) {
                addDiscussionComment(input: {
                  discussionId: $discussionId,
                  body: $body
                }) {
                  comment { id }
                }
              }
            `, {
              discussionId: discussion.id,
              body: `${reply}\n\n<!-- round: ${round}, persona: ${currentPersona} -->`,
            });

            core.info(`${currentPersona} responded (round ${round}).`);

            // If Captain just spoke, create an issue if the decision is to proceed
            if (currentPersona === decider) {
              const lowerReply = reply.toLowerCase();
              if (lowerReply.includes('proceed') || lowerReply.includes('approved') || lowerReply.includes('creating issue')) {
                await github.rest.issues.create({
                  owner, repo,
                  title: `[From Discussion] ${discussion.title}`,
                  body: [
                    `Originated from discussion #${discussionNumber}.`,
                    '',
                    `## Captain's Decision`,
                    '',
                    reply,
                    '',
                    `## Original Discussion`,
                    '',
                    discussion.body,
                  ].join('\n'),
                  labels: ['agent', 'status:ready'],
                });
                core.info('Captain created an issue from the discussion.');

                // Publish decision to The Flight Log
                const wpUrl = process.env.WP_URL;
                const wpAuth = process.env.WP_AUTH;
                if (wpUrl && wpAuth) {
                  const wpGraphQL = async (query, variables = {}) => {
                    const res = await fetch(`${wpUrl}/graphql`, {
                      method: 'POST',
                      headers: {
                        'Authorization': `Basic ${Buffer.from(wpAuth).toString('base64')}`,
                        'Content-Type': 'application/json',
                      },
                      body: JSON.stringify({ query, variables }),
                    });
                    if (!res.ok) {
                      const text = await res.text();
                      throw new Error(`WPGraphQL HTTP ${res.status}: ${text}`);
                    }
                    const json = await res.json();
                    if (json.errors) {
                      throw new Error(`WPGraphQL error: ${JSON.stringify(json.errors)}`);
                    }
                    return json.data;
                  };

                  async function findCategory(slug) {
                    const found = await wpGraphQL(
                      `query($slug: [String]) { categories(where: { slug: $slug }) { nodes { id } } }`,
                      { slug: [slug] }
                    );
                    return found.categories?.nodes?.[0]?.id || null;
                  }

                  try {
                    const categoryId = await findCategory('crew-briefing');
                    if (!categoryId) core.warning('Category "crew-briefing" not found — publishing without category.');
                    const decisionContent = [
                      `<h2>Decision</h2>`,
                      `<p>${reply}</p>`,
                      `<h2>Original Proposal</h2>`,
                      `<p><a href="${discussion.html_url}">View discussion on GitHub</a></p>`,
                      `<p>${discussion.body}</p>`,
                    ].join('\n');

                    const wpData = await wpGraphQL(
                      `mutation CreatePost($title: String!, $content: String!, $status: PostStatusEnum!, $categories: PostCategoriesInput) {
                        createPost(input: { title: $title, content: $content, status: $status, categories: $categories }) {
                          post { id uri link }
                        }
                      }`,
                      {
                        title: discussion.title,
                        content: decisionContent,
                        status: 'PUBLISH',
                        ...(categoryId && { categories: { append: true, nodes: [{ id: categoryId }] } }),
                      }
                    );
                    core.info(`Published decision to The Flight Log: ${wpData.createPost.post.link}`);
                  } catch (wpErr) {
                    core.setFailed(`Flight Log publish failed: ${wpErr.message}`);
                  }
                }
              }
            }
