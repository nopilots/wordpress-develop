name: Pulse

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read

concurrency:
  group: agent-pulse
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Pipeline pulse check
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            const blockages = [];

            // 1. Ready issues with no in-progress work
            const { data: readyIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'status:ready', per_page: 50,
            });
            const { data: inProgressIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'status:in-progress', per_page: 50,
            });
            const staleReady = readyIssues.filter(i =>
              (Date.now() - new Date(i.created_at)) > 2 * 60 * 60 * 1000
            );
            if (staleReady.length > 0 && inProgressIssues.length === 0) {
              blockages.push(`${staleReady.length} ready issue(s) waiting >2h with no work in progress`);
            }

            // 2. Triage backlog
            const { data: triageIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'status:triage', per_page: 50,
            });
            const staleTriage = triageIssues.filter(i =>
              (Date.now() - new Date(i.created_at)) > 3 * 60 * 60 * 1000
            );
            if (staleTriage.length > 0) {
              blockages.push(`${staleTriage.length} issue(s) stuck in triage >3h`);
            }

            // 3. Draft PRs idle too long
            const { data: openPRs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 20,
            });
            const staleDrafts = openPRs.filter(pr =>
              pr.draft && (Date.now() - new Date(pr.updated_at)) > 2 * 60 * 60 * 1000
            );
            if (staleDrafts.length > 0) {
              blockages.push(`${staleDrafts.length} draft PR(s) idle >2h — agent may have stopped`);
            }

            // 4. Non-draft PRs waiting for review
            const staleReview = openPRs.filter(pr =>
              !pr.draft && (Date.now() - new Date(pr.created_at)) > 4 * 60 * 60 * 1000
            );
            if (staleReview.length > 0) {
              blockages.push(`${staleReview.length} PR(s) awaiting review >4h`);
            }

            // 5. In-progress issues with no updates
            const staleWork = inProgressIssues.filter(i =>
              (Date.now() - new Date(i.updated_at)) > 4 * 60 * 60 * 1000
            );
            if (staleWork.length > 0) {
              blockages.push(`${staleWork.length} in-progress issue(s) with no updates >4h`);
            }

            // Report
            if (blockages.length === 0) {
              core.info('Pulse: all clear. Pipeline flowing.');
              return;
            }

            core.warning(`Pulse: ${blockages.length} blockage(s) detected.`);
            blockages.forEach(b => core.warning(`  ${b}`));

            // Auto-remediate: promote stale triage issues to ready (bypass broken Triage)
            for (const issue of staleTriage) {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: issue.number, name: 'status:triage',
              }).catch(() => {});
              await github.rest.issues.addLabels({
                owner, repo, issue_number: issue.number, labels: ['status:ready'],
              });
              core.info(`Auto-promoted #${issue.number} from triage to ready (triage timeout).`);
            }

            // Create alert if multiple blockages
            if (blockages.length >= 3) {
              const { data: existing } = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', per_page: 50,
              });
              if (!existing.some(i => i.title === '[Pulse] Pipeline blockage')) {
                await github.rest.issues.create({
                  owner, repo,
                  title: '[Pulse] Pipeline blockage',
                  body: `The pulse check detected ${blockages.length} blockages:\n\n${blockages.map(b => '- ' + b).join('\n')}\n\nInvestigate and resolve.`,
                  labels: ['agent', 'needs-support'],
                });
              }
            }
