name: System Innovator

on:
  schedule:
    - cron: '0 0 * * 5'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read
  contents: read
  models: read

concurrency:
  group: agent-innovator
  cancel-in-progress: true

jobs:
  imagine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read executive direction from Flight Log
        id: read-executive
        uses: ./.github/actions/read-from-flight-log
        with:
          category-slug: executive
          count: '3'
          wp-url: ${{ secrets.WP_URL }}
          wp-auth: ${{ secrets.WP_AUTH }}

      - name: Read sitrep from Flight Log
        id: read-sitrep
        uses: ./.github/actions/read-from-flight-log
        with:
          category-slug: sitrep
          count: '3'
          wp-url: ${{ secrets.WP_URL }}
          wp-auth: ${{ secrets.WP_AUTH }}

      - name: Propose novel capability
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FL_EXECUTIVE: ${{ steps.read-executive.outputs.summary }}
          FL_SITREP: ${{ steps.read-sitrep.outputs.summary }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            // Rate limit
            const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000).toISOString();
            const { data: recentIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'all', labels: 'agent', sort: 'created', direction: 'desc', per_page: 10,
            });
            const recentCount = recentIssues.filter(i => i.created_at > oneHourAgo).length;
            if (recentCount >= 5) {
              core.warning('Rate limit hit. Skipping.');
              return;
            }

            // Check for existing innovator RFC to avoid flooding
            const { data: openRFCs } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'type:rfc', per_page: 20,
            });
            const recentInnovation = openRFCs.some(i =>
              i.title.startsWith('[Innovator]') &&
              (Date.now() - new Date(i.created_at)) < 7 * 24 * 60 * 60 * 1000
            );
            if (recentInnovation) {
              core.info('Innovation RFC already open from this week. Skipping.');
              return;
            }

            // Gather system context
            const architecture = fs.readFileSync('ARCHITECTURE.md', 'utf8').substring(0, 2000);
            const governance = fs.readFileSync('GOVERNANCE.md', 'utf8').substring(0, 1500);

            // Recent merged PRs
            const { data: closedPRs } = await github.rest.pulls.list({
              owner, repo, state: 'closed', base: 'autopilot', sort: 'updated', direction: 'desc', per_page: 20,
            });
            const merged = closedPRs
              .filter(pr => pr.merged_at)
              .slice(0, 10)
              .map(pr => `- #${pr.number}: ${pr.title}`)
              .join('\n');

            // Recent failures
            const { data: allIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'closed', labels: 'safety:halt', per_page: 10,
            });
            const failures = allIssues
              .map(i => `- #${i.number}: ${i.title}`)
              .join('\n');

            // Executive direction and system health from Flight Log
            const lastAssessment = process.env.FL_EXECUTIVE || 'No Executive assessments yet.';
            const systemHealth = process.env.FL_SITREP || '';

            // Existing workflow files
            const workflows = fs.readdirSync('.github/workflows')
              .filter(f => f.startsWith('agent-'))
              .map(f => f.replace('agent-', '').replace('.yml', ''))
              .join(', ');

            const MODELS = ['openai/gpt-4o-mini', 'anthropic/claude-haiku'];
            const model = MODELS[new Date().getHours() % MODELS.length];

            const res = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model,
                messages: [{
                  role: 'system',
                  content: `You are the Innovator for an autonomous AI-governed WordPress project called No Pilots. Your job is to imagine ONE novel capability that the system doesn't have yet.

You are not a bug fixer. You are not an improver. You are an inventor. Think about what would make this system fundamentally more capable, more trustworthy, or more valuable.

Rules:
- Propose ONE idea only
- It must be implementable as a GitHub Actions workflow
- It must NOT duplicate any existing workflow (listed below)
- It must reference specific data that inspired the idea
- It must explain why it matters
- Be specific and concrete, not vague
- No AI slop

Existing workflows: ${workflows}

Respond in this exact format:
TITLE: (short, specific title)
INSIGHT: (what data or pattern inspired this — one sentence)
PROPOSAL: (what to build — 2-3 sentences)
VALUE: (why it matters — one sentence)
FEASIBILITY: (how to implement — one sentence)`,
                }, {
                  role: 'user',
                  content: `Here is the current system state. Find something missing that would be genuinely novel.

## Architecture
${architecture}

## Governance
${governance}

## Recent work (merged PRs)
${merged || 'None.'}

## Recent failures
${failures || 'None.'}

## Executive direction (from Flight Log)
${lastAssessment}

## System health (from Flight Log)
${systemHealth || 'None.'}`,
                }],
                max_tokens: 500,
                temperature: 0.8,
              }),
            });

            if (!res.ok) {
              core.warning('Models API unavailable.');
              return;
            }

            const result = await res.json();
            const response = result.choices?.[0]?.message?.content || '';

            const title = response.match(/TITLE:\s*(.+)/)?.[1]?.trim();
            const insight = response.match(/INSIGHT:\s*(.+)/)?.[1]?.trim();
            const proposal = response.match(/PROPOSAL:\s*([\s\S]*?)(?=VALUE:|$)/)?.[1]?.trim();
            const value = response.match(/VALUE:\s*(.+)/)?.[1]?.trim();
            const feasibility = response.match(/FEASIBILITY:\s*(.+)/)?.[1]?.trim();

            if (!title || !proposal) {
              core.warning('Could not parse innovation proposal.');
              return;
            }

            await github.rest.issues.create({
              owner, repo,
              title: `[Innovator] ${title}`,
              body: [
                `The Innovator proposes a novel capability for the system.`,
                '',
                `**Insight:** ${insight || 'Not specified.'}`,
                '',
                `## Proposal`,
                '',
                proposal,
                '',
                `**Value:** ${value || 'Not specified.'}`,
                `**Feasibility:** ${feasibility || 'Not specified.'}`,
                '',
                `This is an RFC. The crew should evaluate whether this capability is worth building.`,
              ].join('\n'),
              labels: ['agent', 'type:rfc', 'status:triage'],
            });

            core.info(`Innovation proposed: ${title}`);
