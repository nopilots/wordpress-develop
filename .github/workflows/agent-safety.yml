name: Agent Safety

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  contents: read
  actions: read

jobs:
  safety-check:
    runs-on: ubuntu-latest
    steps:
      - name: Run safety checks
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let halt = false;
            const reasons = [];

            // 1. Check open agent issue count
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'agent',
              per_page: 100,
            });
            if (issues.length > 20) {
              halt = true;
              reasons.push(`Open agent issues: ${issues.length} (limit: 20)`);
            }

            // 2. Check open agent PR count
            const { data: prs } = await github.rest.pulls.list({
              owner, repo,
              state: 'open',
              per_page: 100,
            });
            const agentPRs = prs.filter(p =>
              p.head.ref.startsWith('agent/') ||
              p.head.ref.startsWith('copilot/') ||
              p.labels.some(l => l.name === 'agent')
            );
            if (agentPRs.length > 10) {
              halt = true;
              reasons.push(`Open agent PRs: ${agentPRs.length} (limit: 10)`);
            }

            // 3. Loop detection
            for (const pr of agentPRs) {
              const { data: checks } = await github.rest.checks.listForRef({
                owner, repo,
                ref: pr.head.sha,
              });
              const failures = checks.check_runs.filter(c =>
                c.conclusion === 'failure'
              );
              if (failures.length > 3) {
                reasons.push(`PR #${pr.number} has ${failures.length} failed checks`);
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: pr.number,
                  labels: ['safety:halt'],
                });
              }
            }

            // 4. Check workflow run rate
            const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000).toISOString();
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner, repo,
              created: `>=${oneHourAgo}`,
              per_page: 100,
            });
            const agentRuns = runs.workflow_runs.filter(r =>
              r.name.startsWith('Agent')
            );
            if (agentRuns.length > 50) {
              halt = true;
              reasons.push(`Agent workflow runs in last hour: ${agentRuns.length} (limit: 50)`);
            }

            // 5. Auto-recovery: if no halt conditions, remove safety:halt labels
            if (!halt && reasons.length === 0) {
              for (const pr of agentPRs) {
                if (pr.labels.some(l => l.name === 'safety:halt')) {
                  await github.rest.issues.removeLabel({
                    owner, repo,
                    issue_number: pr.number,
                    name: 'safety:halt',
                  }).catch(() => {});
                  core.info(`Recovered PR #${pr.number} — removed safety:halt`);
                }
              }

              // Close any open halt issues
              const { data: haltIssues } = await github.rest.issues.listForRepo({
                owner, repo,
                state: 'open',
                labels: 'safety:halt',
                per_page: 10,
              });
              for (const issue of haltIssues) {
                if (issue.title.startsWith('[SAFETY]')) {
                  await github.rest.issues.update({
                    owner, repo,
                    issue_number: issue.number,
                    state: 'closed',
                    state_reason: 'completed',
                  });
                  core.info(`Auto-closed safety issue #${issue.number}`);
                }
              }

              core.info(`Safety OK. Issues: ${issues.length}, PRs: ${agentPRs.length}, Runs: ${agentRuns.length}`);
              return;
            }

            // 6. Halt — but only create issue if none exists
            if (halt) {
              const { data: existingHalt } = await github.rest.issues.listForRepo({
                owner, repo,
                state: 'open',
                labels: 'safety:halt',
                per_page: 5,
              });

              const alreadyHasHaltIssue = existingHalt.some(i =>
                i.title.startsWith('[SAFETY]')
              );

              for (const pr of agentPRs) {
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: pr.number,
                  labels: ['safety:halt'],
                });
              }

              if (!alreadyHasHaltIssue) {
                await github.rest.issues.create({
                  owner, repo,
                  title: '[SAFETY] Circuit breaker activated',
                  body: [
                    '## Safety Alert',
                    '',
                    ...reasons.map(r => `- ${r}`),
                    '',
                    'Agent PRs labeled `safety:halt`. Will auto-recover when conditions normalize.',
                  ].join('\n'),
                  labels: ['safety:halt', 'agent'],
                });
              }

              core.setFailed(`Safety halt: ${reasons.join('; ')}`);
            }
