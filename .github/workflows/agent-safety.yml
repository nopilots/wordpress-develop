name: Safety

on:
  pull_request_target:
    types: [opened, reopened]
  check_suite:
    types: [completed]
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  contents: read
  actions: read

concurrency:
  group: agent-safety
  cancel-in-progress: false

jobs:
  safety-check:
    runs-on: ubuntu-latest
    steps:
      - name: Run safety checks
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) {
              core.info('System is off.');
              return;
            }

            let halt = false;
            const reasons = [];

            // Track needs:human issues for visibility (warning only — do not add to reasons,
            // as that would permanently block auto-recovery while any needs:human issue is open)
            const { data: humanIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'needs:human', per_page: 50,
            });
            if (humanIssues.length > 0) {
              core.warning(`${humanIssues.length} needs:human issue(s) open: ${humanIssues.map(i => `#${i.number}: ${i.title}`).join(', ')}`);
            }

            // 1. Check open agent issue count
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'agent',
              per_page: 100,
            });
            // Auto-close stale in-progress issues >7 days old
            const stale = issues
              .filter(i =>
                i.labels.some(l => l.name === 'status:in-progress') &&
                (Date.now() - new Date(i.created_at)) > 6 * 60 * 60 * 1000
              )
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at))
              .slice(0, 3);

            for (const issue of stale) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issue.number,
                body: 'Auto-closing: issue has been in progress for >7 days without resolution.',
              });
              await github.rest.issues.update({
                owner, repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
              core.info(`Auto-closed stale issue #${issue.number}`);
            }

            // Pipeline freeze detection: status:ready issues >2 hours old with no in-progress work
            const readyIssues = issues.filter(i =>
              i.labels.some(l => l.name === 'status:ready') &&
              (Date.now() - new Date(i.created_at)) > 2 * 60 * 60 * 1000
            );
            const inProgress = issues.filter(i => i.labels.some(l => l.name === 'status:in-progress'));
            if (readyIssues.length > 0 && inProgress.length === 0) {
              reasons.push(`Pipeline may be frozen: ${readyIssues.length} ready issues >2h old, no in-progress work`);
            }

            if (issues.length > 20) {
              halt = true;
              reasons.push(`Open agent issues: ${issues.length} (limit: 20)`);
            }

            // 2. Check open agent PR count
            const { data: prs } = await github.rest.pulls.list({
              owner, repo,
              state: 'open',
              per_page: 100,
            });
            const agentPRs = prs.filter(p =>
              p.head.ref.startsWith('agent/') ||
              p.head.ref.startsWith('copilot/') ||
              p.head.ref.startsWith('claude/') ||
              p.head.ref.startsWith('codex/') ||
              p.labels.some(l => l.name === 'agent')
            );
            if (agentPRs.length > 10) {
              halt = true;
              reasons.push(`Open agent PRs: ${agentPRs.length} (limit: 10)`);
            }

            // 3. Loop detection
            for (const pr of agentPRs) {
              const { data: checks } = await github.rest.checks.listForRef({
                owner, repo,
                ref: pr.head.sha,
              });
              const failures = checks.check_runs.filter(c =>
                c.conclusion === 'failure'
              );
              if (failures.length > 3) {
                reasons.push(`PR #${pr.number} has ${failures.length} failed checks`);
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: pr.number,
                  labels: ['safety:halt'],
                });
              }
            }

            // 4. Auto-recovery: if no halt conditions, clean up
            if (!halt && reasons.length === 0) {
              for (const pr of agentPRs) {
                if (pr.labels.some(l => l.name === 'safety:halt')) {
                  await github.rest.issues.removeLabel({
                    owner, repo,
                    issue_number: pr.number,
                    name: 'safety:halt',
                  }).catch(() => {});
                  core.info(`Recovered PR #${pr.number}`);
                }
              }

              const { data: haltIssues } = await github.rest.issues.listForRepo({
                owner, repo,
                state: 'open',
                labels: 'safety:halt',
                per_page: 10,
              });
              for (const issue of haltIssues) {
                if (issue.title.startsWith('[SAFETY]')) {
                  try {
                    await github.graphql(`
                      mutation($id: ID!) { unpinIssue(input: { issueId: $id }) { issue { id } } }
                    `, { id: issue.node_id });
                  } catch (e) { /* may not be pinned */ }
                  await github.rest.issues.update({
                    owner, repo,
                    issue_number: issue.number,
                    state: 'closed',
                    state_reason: 'completed',
                  });
                }
              }

              core.info(`Safety OK. Issues: ${issues.length}, PRs: ${agentPRs.length}`);
              return;
            }

            // 5. Halt
            if (halt) {
              const { data: existingHalt } = await github.rest.issues.listForRepo({
                owner, repo,
                state: 'open',
                labels: 'safety:halt',
                per_page: 5,
              });

              const alreadyHasHaltIssue = existingHalt.some(i =>
                i.title.startsWith('[SAFETY]')
              );

              for (const pr of agentPRs) {
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: pr.number,
                  labels: ['safety:halt'],
                });
              }

              if (!alreadyHasHaltIssue) {
                const { data: haltIssue } = await github.rest.issues.create({
                  owner, repo,
                  title: '[SAFETY] Circuit breaker activated',
                  body: [
                    '## Safety Alert',
                    '',
                    ...reasons.map(r => `- ${r}`),
                    '',
                    'Agent PRs labeled `safety:halt`. Will auto-recover when conditions normalize.',
                  ].join('\n'),
                  labels: ['safety:halt', 'agent'],
                });

                // Pin safety issues for visibility
                try {
                  await github.graphql(`
                    mutation($id: ID!) { pinIssue(input: { issueId: $id }) { issue { id } } }
                  `, { id: haltIssue.node_id });
                } catch (e) { /* max 3 pinned issues */ }
              }

              core.setFailed(`Safety halt: ${reasons.join('; ')}`);

              // Auto-escalate to system:off if multiple halt conditions persist
              const { data: allHaltIssues } = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', labels: 'safety:halt', per_page: 20,
              });
              const haltCount = allHaltIssues.filter(i => i.title.startsWith('[SAFETY]')).length;
              if (haltCount >= 3) {
                const { data: sysOff } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'open', labels: 'system:off', per_page: 1,
                });
                if (sysOff.length === 0) {
                  const { data: offIssue } = await github.rest.issues.create({
                    owner, repo,
                    title: '[SAFETY] System kill switch activated',
                    body: [
                      '## Automatic Escalation',
                      '',
                      `${haltCount} concurrent safety halt issues detected. System has been shut down.`,
                      '',
                      'A human must review and close this issue to re-enable the system.',
                      '',
                      ...reasons.map(r => `- ${r}`),
                    ].join('\n'),
                    labels: ['system:off', 'safety:halt', 'agent'],
                  });
                  try {
                    await github.graphql(`
                      mutation($id: ID!) { pinIssue(input: { issueId: $id }) { issue { id } } }
                    `, { id: offIssue.node_id });
                  } catch (e) { /* max 3 pinned */ }
                  core.error('ESCALATED: system:off kill switch activated due to multiple concurrent halts.');
                }
              }
            }
