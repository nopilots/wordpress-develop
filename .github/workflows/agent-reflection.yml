name: Agent Reflection

on:
  schedule:
    - cron: '0 0 * * 3,6'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read
  contents: read

concurrency:
  group: agent-reflection
  cancel-in-progress: true

jobs:
  reflect:
    runs-on: ubuntu-latest
    steps:
      - name: Create reflection issue
        uses: actions/github-script@v7
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_AUTH: ${{ secrets.WP_AUTH }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            // Check if reflection issue already open
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'type:reflection',
              per_page: 5,
            });

            // Auto-close stale reflection issues >7 days old
            for (const issue of existing) {
              if (Date.now() - new Date(issue.updated_at) > 7 * 24 * 60 * 60 * 1000) {
                await github.rest.issues.update({
                  owner, repo, issue_number: issue.number,
                  state: 'closed', state_reason: 'not_planned',
                });
                core.info(`Auto-closed stale reflection issue #${issue.number}`);
              }
            }

            const stillOpen = existing.filter(i =>
              Date.now() - new Date(i.updated_at) <= 7 * 24 * 60 * 60 * 1000
            );
            if (stillOpen.length > 0) {
              core.info('Reflection issue already open.');
              return;
            }

            // Gather data from the past week
            const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();

            // Merged PRs
            const { data: closedPRs } = await github.rest.pulls.list({
              owner, repo,
              state: 'closed',
              base: 'autopilot',
              sort: 'updated',
              direction: 'desc',
              per_page: 20,
            });
            const mergedPRs = closedPRs
              .filter(pr => pr.merged_at && pr.merged_at > oneWeekAgo);
            const merged = mergedPRs
              .map(pr => `- #${pr.number}: ${pr.title}`);

            // Still-open PRs
            const { data: openPRs } = await github.rest.pulls.list({
              owner, repo,
              state: 'open',
              per_page: 20,
            });
            const stalePRs = openPRs
              .filter(pr => new Date(pr.updated_at) < new Date(Date.now() - 3 * 24 * 60 * 60 * 1000));
            const stale = stalePRs
              .map(pr => `- #${pr.number}: ${pr.title} (stale ${Math.floor((Date.now() - new Date(pr.updated_at)) / (1000 * 60 * 60 * 24))}d)`);

            // Safety halts
            const { data: halted } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'all',
              labels: 'safety:halt',
              per_page: 10,
            });
            const haltList = halted.map(i => `- #${i.number}: ${i.title}`);

            await github.rest.issues.create({
              owner, repo,
              title: `Weekly reflection: review progress and propose governance changes`,
              body: [
                `You are reviewing the past week of autonomous development.`,
                '',
                `## Context`,
                '',
                `Read \`GOVERNANCE.md\` — especially the Agent-Determined section for blanks that may need filling.`,
                '',
                `### Merged this week (${merged.length})`,
                merged.join('\n') || '_None._',
                '',
                `### Stale PRs (${stale.length})`,
                stale.join('\n') || '_None._',
                '',
                `### Safety incidents (${haltList.length})`,
                haltList.join('\n') || '_None._',
                '',
                `## Task`,
                '',
                `1. Evaluate the quality of merged work — did it improve WordPress?`,
                `2. Identify stale PRs and comment on them with next steps or close them`,
                `3. If any patterns emerge (repeated failures, gaps in process), propose a governance amendment via PR to \`GOVERNANCE.md\``,
                `4. Review the Agent-Determined blanks — if you have enough experience now to define one, propose it`,
                `5. Close this issue with a summary of your findings`,
              ].join('\n'),
              labels: ['agent', 'type:reflection', 'status:ready'],
            });

            core.info('Created weekly reflection issue.');

            // --- Publish to The Flight Log ---
            const wpUrl = process.env.WP_URL;
            const wpAuth = process.env.WP_AUTH;

            if (!wpUrl || !wpAuth) {
              core.info('WP credentials not set. Skipping blog post.');
              return;
            }

            const wpGraphQL = async (query, variables = {}) => {
              const res = await fetch(`${wpUrl}/graphql`, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${Buffer.from(wpAuth).toString('base64')}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ query, variables }),
              });
              if (!res.ok) {
                const text = await res.text();
                throw new Error(`WPGraphQL HTTP ${res.status}: ${text}`);
              }
              const json = await res.json();
              if (json.errors) {
                throw new Error(`WPGraphQL error: ${JSON.stringify(json.errors)}`);
              }
              return json.data;
            };

            async function findCategory(slug) {
              const found = await wpGraphQL(
                `query($slug: [String]) { categories(where: { slug: $slug }) { nodes { id } } }`,
                { slug: [slug] }
              );
              return found.categories?.nodes?.[0]?.id || null;
            }

            try {
              const categoryId = await findCategory('status-report');
              if (!categoryId) core.warning('Category "status-report" not found — publishing without category.');
              const content = [
                `<h2>Merged this week (${mergedPRs.length})</h2>`,
                mergedPRs.length
                  ? `<ul>${mergedPRs.map(pr => `<li><a href="${pr.html_url}">#${pr.number}</a>: ${pr.title}</li>`).join('')}</ul>`
                  : '<p>None.</p>',
                `<h2>Stale PRs (${stalePRs.length})</h2>`,
                stalePRs.length
                  ? `<ul>${stalePRs.map(pr => `<li><a href="${pr.html_url}">#${pr.number}</a>: ${pr.title} — stale ${Math.floor((Date.now() - new Date(pr.updated_at)) / (1000 * 60 * 60 * 24))}d</li>`).join('')}</ul>`
                  : '<p>None.</p>',
                `<h2>Safety incidents (${halted.length})</h2>`,
                halted.length
                  ? `<ul>${halted.map(i => `<li><a href="${i.html_url}">#${i.number}</a>: ${i.title}</li>`).join('')}</ul>`
                  : '<p>None.</p>',
              ].join('\n');

              const data = await wpGraphQL(
                `mutation CreatePost($title: String!, $content: String!, $status: PostStatusEnum!, $categories: PostCategoriesInput) {
                  createPost(input: { title: $title, content: $content, status: $status, categories: $categories }) {
                    post { id uri link }
                  }
                }`,
                {
                  title: `Status Report`,
                  content,
                  status: 'PUBLISH',
                  ...(categoryId && { categories: { append: true, nodes: [{ id: categoryId }] } }),
                }
              );
              core.info(`Published reflection to The Flight Log: ${data.createPost.post.link}`);

              // Post-publish refinement
              const postId = data.createPost.post.id;
              const postLink = data.createPost.post.link;
              try {
                const postData = await wpGraphQL(
                  `query($id: ID!) { post(id: $id, idType: ID) { title content } }`,
                  { id: postId }
                );
                const postTitle = postData.post?.title || '';
                const postContent = postData.post?.content || '';

                const refineRes = await fetch('https://models.github.ai/inference/chat/completions', {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    model: 'openai/gpt-4o-mini',
                    messages: [{
                      role: 'system',
                      content: 'You are a copy editor for a technical blog called "No Pilots" — dispatches from an autonomous AI-governed WordPress project. The voice is professional flight ops. Posts should be concise, well-structured HTML, and only show what matters for the category context. Strip anything redundant.',
                    }, {
                      role: 'user',
                      content: `Review and refine this Status Report post. Fix any raw markdown, remove unnecessary content, ensure clean HTML formatting. If the post is already good, reply with exactly: NO_CHANGES\n\nOtherwise reply with the complete refined HTML content (no markdown, no explanation, just the HTML).\n\nCurrent content:\n${postContent.substring(0, 3000)}`,
                    }],
                    max_tokens: 1000,
                    temperature: 0.3,
                  }),
                });

                if (refineRes.ok) {
                  const refineResult = await refineRes.json();
                  const refined = refineResult.choices?.[0]?.message?.content || '';
                  if (refined && !refined.includes('NO_CHANGES')) {
                    await wpGraphQL(
                      `mutation($id: ID!, $content: String!) {
                        updatePost(input: { id: $id, content: $content }) { post { id } }
                      }`,
                      { id: postId, content: refined }
                    );
                    core.info('Post refined after publish.');
                  } else {
                    core.info('Post quality: good, no refinement needed.');
                  }
                }
              } catch (qErr) {
                core.warning(`Post refinement failed: ${qErr.message}`);
              }
            } catch (err) {
              core.setFailed(`Flight Log publish failed: ${err.message}`);
            }
