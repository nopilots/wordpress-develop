name: Agent Reflection

on:
  schedule:
    - cron: '0 0 * * 3,6'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read
  contents: read

concurrency:
  group: agent-reflection
  cancel-in-progress: true

jobs:
  reflect:
    runs-on: ubuntu-latest
    steps:
      - name: Create reflection issue
        uses: actions/github-script@v7
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_AUTH: ${{ secrets.WP_AUTH }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            // Check if reflection issue already open
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'type:reflection',
              per_page: 5,
            });

            if (existing.length > 0) {
              core.info('Reflection issue already open.');
              return;
            }

            // Gather data from the past week
            const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();

            // Merged PRs
            const { data: closedPRs } = await github.rest.pulls.list({
              owner, repo,
              state: 'closed',
              base: 'autopilot',
              sort: 'updated',
              direction: 'desc',
              per_page: 20,
            });
            const merged = closedPRs
              .filter(pr => pr.merged_at && pr.merged_at > oneWeekAgo)
              .map(pr => `- #${pr.number}: ${pr.title}`);

            // Still-open PRs
            const { data: openPRs } = await github.rest.pulls.list({
              owner, repo,
              state: 'open',
              per_page: 20,
            });
            const stale = openPRs
              .filter(pr => new Date(pr.updated_at) < new Date(Date.now() - 3 * 24 * 60 * 60 * 1000))
              .map(pr => `- #${pr.number}: ${pr.title} (stale ${Math.floor((Date.now() - new Date(pr.updated_at)) / (1000 * 60 * 60 * 24))}d)`);

            // Safety halts
            const { data: halted } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'all',
              labels: 'safety:halt',
              per_page: 10,
            });
            const haltList = halted.map(i => `- #${i.number}: ${i.title}`);

            await github.rest.issues.create({
              owner, repo,
              title: `Weekly reflection: review progress and propose governance changes`,
              body: [
                `You are reviewing the past week of autonomous development.`,
                '',
                `## Context`,
                '',
                `Read \`GOVERNANCE.md\` — especially the Agent-Determined section for blanks that may need filling.`,
                '',
                `### Merged this week (${merged.length})`,
                merged.join('\n') || '_None._',
                '',
                `### Stale PRs (${stale.length})`,
                stale.join('\n') || '_None._',
                '',
                `### Safety incidents (${haltList.length})`,
                haltList.join('\n') || '_None._',
                '',
                `## Task`,
                '',
                `1. Evaluate the quality of merged work — did it improve WordPress?`,
                `2. Identify stale PRs and comment on them with next steps or close them`,
                `3. If any patterns emerge (repeated failures, gaps in process), propose a governance amendment via PR to \`GOVERNANCE.md\``,
                `4. Review the Agent-Determined blanks — if you have enough experience now to define one, propose it`,
                `5. Close this issue with a summary of your findings`,
              ].join('\n'),
              labels: ['agent', 'type:reflection', 'status:ready'],
            });

            core.info('Created weekly reflection issue.');

            // --- Publish to The Flight Log ---
            const wpUrl = process.env.WP_URL;
            const wpAuth = process.env.WP_AUTH;

            if (!wpUrl || !wpAuth) {
              core.info('WP credentials not set. Skipping blog post.');
              return;
            }

            const wpGraphQL = async (query, variables = {}) => {
              const res = await fetch(`${wpUrl}/graphql`, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${Buffer.from(wpAuth).toString('base64')}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ query, variables }),
              });
              if (!res.ok) {
                const text = await res.text();
                throw new Error(`WPGraphQL HTTP ${res.status}: ${text}`);
              }
              const json = await res.json();
              if (json.errors) {
                throw new Error(`WPGraphQL error: ${JSON.stringify(json.errors)}`);
              }
              return json.data;
            };

            async function ensureCategory(name, slug) {
              const found = await wpGraphQL(
                `query($slug: [String]) { categories(where: { slug: $slug }) { nodes { databaseId } } }`,
                { slug: [slug] }
              );
              if (found.categories?.nodes?.[0]) return found.categories.nodes[0].databaseId;
              const created = await wpGraphQL(
                `mutation($name: String!, $slug: String) { createCategory(input: { name: $name, slug: $slug }) { category { databaseId } } }`,
                { name, slug }
              );
              return created.createCategory.category.databaseId;
            }

            try {
              const categoryId = await ensureCategory('Weekly Reflection', 'weekly-reflection');
              const weekOf = new Date().toISOString().split('T')[0];
              const content = [
                `<h2>Merged this week (${merged.length})</h2>`,
                merged.length ? `<ul>${merged.map(m => `<li>${m.replace('- ', '')}</li>`).join('')}</ul>` : '<p>None.</p>',
                `<h2>Stale PRs (${stale.length})</h2>`,
                stale.length ? `<ul>${stale.map(s => `<li>${s.replace('- ', '')}</li>`).join('')}</ul>` : '<p>None.</p>',
                `<h2>Safety incidents (${haltList.length})</h2>`,
                haltList.length ? `<ul>${haltList.map(h => `<li>${h.replace('- ', '')}</li>`).join('')}</ul>` : '<p>None.</p>',
              ].join('\n');

              const data = await wpGraphQL(
                `mutation CreatePost($title: String!, $content: String!, $status: PostStatusEnum!, $catId: ID!) {
                  createPost(input: { title: $title, content: $content, status: $status, categories: { append: true, nodes: [{ id: $catId }] } }) {
                    post { id uri link }
                  }
                }`,
                {
                  title: `Weekly Reflection: ${weekOf}`,
                  content,
                  status: 'PUBLISH',
                  catId: String(categoryId),
                }
              );
              core.info(`Published reflection to The Flight Log: ${data.createPost.post.link}`);
            } catch (err) {
              core.setFailed(`Flight Log publish failed: ${err.message}`);
            }
