name: SITREP

on:
  schedule:
    - cron: '0 0 * * 3,6'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read
  contents: read

concurrency:
  group: agent-reflection
  cancel-in-progress: true

jobs:
  reflect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create reflection issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            // Check if reflection issue already open
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'type:reflection',
              per_page: 5,
            });

            // Auto-close stale reflection issues >7 days old
            for (const issue of existing) {
              if (Date.now() - new Date(issue.updated_at) > 7 * 24 * 60 * 60 * 1000) {
                await github.rest.issues.update({
                  owner, repo, issue_number: issue.number,
                  state: 'closed', state_reason: 'not_planned',
                });
                core.info(`Auto-closed stale reflection issue #${issue.number}`);
              }
            }

            const stillOpen = existing.filter(i =>
              Date.now() - new Date(i.updated_at) <= 7 * 24 * 60 * 60 * 1000
            );
            if (stillOpen.length > 0) {
              core.info('Reflection issue already open.');
              return;
            }

            // Gather data from the past week
            const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();

            // Merged PRs
            const { data: closedPRs } = await github.rest.pulls.list({
              owner, repo,
              state: 'closed',
              base: 'autopilot',
              sort: 'updated',
              direction: 'desc',
              per_page: 20,
            });
            const mergedPRs = closedPRs
              .filter(pr => pr.merged_at && pr.merged_at > oneWeekAgo);
            const merged = mergedPRs
              .map(pr => `- #${pr.number}: ${pr.title}`);

            // Still-open PRs
            const { data: openPRs } = await github.rest.pulls.list({
              owner, repo,
              state: 'open',
              per_page: 20,
            });
            const stalePRs = openPRs
              .filter(pr => new Date(pr.updated_at) < new Date(Date.now() - 3 * 24 * 60 * 60 * 1000));
            const stale = stalePRs
              .map(pr => `- #${pr.number}: ${pr.title} (stale ${Math.floor((Date.now() - new Date(pr.updated_at)) / (1000 * 60 * 60 * 24))}d)`);

            // Safety halts
            const { data: halted } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'all',
              labels: 'safety:halt',
              per_page: 10,
            });
            const haltList = halted.map(i => `- #${i.number}: ${i.title}`);

            await github.rest.issues.create({
              owner, repo,
              title: `Weekly reflection: review progress and propose governance changes`,
              body: [
                `You are reviewing the past week of autonomous development.`,
                '',
                `## Context`,
                '',
                `Read \`GOVERNANCE.md\` — especially the Agent-Determined section for blanks that may need filling.`,
                '',
                `### Merged this week (${merged.length})`,
                merged.join('\n') || '_None._',
                '',
                `### Stale PRs (${stale.length})`,
                stale.join('\n') || '_None._',
                '',
                `### Safety incidents (${haltList.length})`,
                haltList.join('\n') || '_None._',
                '',
                `## Task`,
                '',
                `1. Evaluate the quality of merged work — did it improve WordPress?`,
                `2. Identify stale PRs and comment on them with next steps or close them`,
                `3. If any patterns emerge (repeated failures, gaps in process), propose a governance amendment via PR to \`GOVERNANCE.md\``,
                `4. Review the Agent-Determined blanks — if you have enough experience now to define one, propose it`,
                `5. Close this issue with a summary of your findings`,
              ].join('\n'),
              labels: ['agent', 'type:reflection', 'status:ready'],
            });

            core.info('Created weekly reflection issue.');

            // --- Build Flight Log content ---
            const postContent = [
              `<h2>Merged this week (${mergedPRs.length})</h2>`,
              mergedPRs.length
                ? `<ul>${mergedPRs.map(pr => `<li><a href="${pr.html_url}">#${pr.number}</a>: ${pr.title}</li>`).join('')}</ul>`
                : '<p>None.</p>',
              `<h2>Stale PRs (${stalePRs.length})</h2>`,
              stalePRs.length
                ? `<ul>${stalePRs.map(pr => `<li><a href="${pr.html_url}">#${pr.number}</a>: ${pr.title} — stale ${Math.floor((Date.now() - new Date(pr.updated_at)) / (1000 * 60 * 60 * 24))}d</li>`).join('')}</ul>`
                : '<p>None.</p>',
              `<h2>Safety incidents (${halted.length})</h2>`,
              halted.length
                ? `<ul>${halted.map(i => `<li><a href="${i.html_url}">#${i.number}</a>: ${i.title}</li>`).join('')}</ul>`
                : '<p>None.</p>',
            ].join('\n');

            core.exportVariable('FLIGHT_LOG_TITLE', `Week of ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`);
            core.exportVariable('FLIGHT_LOG_CONTENT', postContent);
            core.exportVariable('FLIGHT_LOG_EXCERPT', `${mergedPRs.length} merged. ${stalePRs.length} stale. ${halted.length} safety incident${halted.length !== 1 ? 's' : ''}.`);

      - name: Publish to Flight Log
        if: env.FLIGHT_LOG_CONTENT != ''
        uses: ./.github/actions/publish-to-flight-log
        with:
          title: ${{ env.FLIGHT_LOG_TITLE }}
          content: ${{ env.FLIGHT_LOG_CONTENT }}
          excerpt: ${{ env.FLIGHT_LOG_EXCERPT }}
          category-slug: sitrep
          author-slug: autopilot
          refine-prompt: 'Review and refine this Status Report. Fix any raw markdown, ensure clean HTML. Keep it concise — merged PRs, stale work, incidents. No AI slop — no excitement, no announcements, no filler.'
          wp-url: ${{ secrets.WP_URL }}
          wp-auth: ${{ secrets.WP_AUTH }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
