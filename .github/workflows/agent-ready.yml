name: Draft Converter

on:
  check_suite:
    types: [completed]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: agent-ready
  cancel-in-progress: true

jobs:
  convert-drafts:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PAT_APP_ID }}
          private-key: ${{ secrets.PAT_PRIVATE_KEY }}

      - name: Mark completed agent drafts as ready
        uses: actions/github-script@v7
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            const { data: prs } = await github.rest.pulls.list({
              owner, repo,
              state: 'open',
              base: 'autopilot',
              per_page: 20,
            });

            const drafts = prs.filter(pr =>
              pr.draft && (
                pr.head.ref.startsWith('copilot/') ||
                pr.head.ref.startsWith('agent/') ||
                pr.head.ref.startsWith('claude/') ||
                pr.head.ref.startsWith('codex/')
              )
            );

            for (const pr of drafts) {
              const { data: commits } = await github.rest.pulls.listCommits({
                owner, repo,
                pull_number: pr.number,
                per_page: 1,
              });

              if (commits.length === 0) continue;

              const lastCommit = new Date(commits[commits.length - 1].commit.committer.date);
              const minutesSinceLastCommit = (Date.now() - lastCommit.getTime()) / (1000 * 60);

              if (minutesSinceLastCommit < 5) {
                core.info(`PR #${pr.number}: still active (${minutesSinceLastCommit.toFixed(0)}m). Skipping.`);
                continue;
              }

              try {
                // COPILOT_PAT required — only user tokens can mark PRs ready
                const pat = process.env.COPILOT_PAT;
                const res = await fetch('https://api.github.com/graphql', {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${pat}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    query: `mutation($id: ID!) {
                      markPullRequestReadyForReview(input: { pullRequestId: $id }) {
                        pullRequest { number }
                      }
                    }`,
                    variables: { id: pr.node_id },
                  }),
                });
                const result = await res.json();
                if (result.errors) throw new Error(result.errors[0].message);

                core.info(`Marked PR #${pr.number} as ready for review.`);

                // Remove PAT owner from assignees
                const appToken = process.env.APP_TOKEN;
                const viewerRes = await fetch('https://api.github.com/graphql', {
                  method: 'POST',
                  headers: { 'Authorization': `Bearer ${pat}`, 'Content-Type': 'application/json' },
                  body: JSON.stringify({ query: '{ viewer { login } }' }),
                });
                const viewer = await viewerRes.json();
                const patOwner = viewer?.data?.viewer?.login;
                if (patOwner) {
                  await fetch(`https://api.github.com/repos/${owner}/${repo}/issues/${pr.number}/assignees`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${appToken}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
                    body: JSON.stringify({ assignees: [patOwner] }),
                  }).catch(() => {});
                  core.info(`Removed ${patOwner} from PR #${pr.number}.`);
                }
              } catch (e) {
                core.warning(`Failed to mark PR #${pr.number} ready: ${e.message}`);
              }
            }
