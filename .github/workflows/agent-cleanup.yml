name: Agent Cleanup

on:
  pull_request_target:
    types: [closed]

permissions:
  issues: write
  pull-requests: read
  models: read

jobs:
  close-linked-issues:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'autopilot'
    steps:
      - name: Cleanup and publish learning
        uses: actions/github-script@v7
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_AUTH: ${{ secrets.WP_AUTH }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const branch = pr.head.ref || '';

            // --- Close linked issues ---
            const issueNumbers = new Set();

            const closePatterns = body.match(/(?:closes|fixes|resolves)\s+#(\d+)/gi) || [];
            for (const match of closePatterns) {
              const num = match.match(/#(\d+)/);
              if (num) issueNumbers.add(parseInt(num[1]));
            }

            if (issueNumbers.size === 0) {
              const refs = body.match(/#(\d+)/g) || [];
              for (const ref of refs) {
                const num = parseInt(ref.replace('#', ''));
                if (num > 0 && num < 10000) issueNumbers.add(num);
              }
            }

            if (issueNumbers.size === 0) {
              const branchMatch = branch.match(/(?:copilot|agent)\/(\d+)/) ||
                                  branch.match(/issue-(\d+)/);
              if (branchMatch) issueNumbers.add(parseInt(branchMatch[1]));
            }

            for (const num of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner, repo, issue_number: num,
                });
                if (issue.state !== 'open') continue;
                if (!issue.labels.some(l => l.name === 'agent')) continue;

                await github.rest.issues.update({
                  owner, repo,
                  issue_number: num,
                  state: 'closed',
                  state_reason: 'completed',
                });
                core.info(`Closed issue #${num}.`);
              } catch (e) {
                core.info(`Issue #${num} not found or already closed.`);
              }
            }

            // --- Publish learning to The Flight Log ---
            const wpUrl = process.env.WP_URL;
            const wpAuth = process.env.WP_AUTH;

            if (!wpUrl || !wpAuth) {
              core.info('WP credentials not set. Skipping blog post.');
              return;
            }

            // Get PR review comments for context
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner, repo, pull_number: pr.number,
            });

            const reviewSummary = reviews
              .filter(r => r.body && r.body.length > 10)
              .map(r => `${r.user.login}: ${r.body.split('\n')[0]}`)
              .join('\n');

            // Generate a brief learning summary via Models API
            const modelRes = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: 'openai/gpt-4o-mini',
                messages: [{
                  role: 'user',
                  content: `Write a brief blog post (3-4 paragraphs) about this merged PR for "The Flight Log" — a dispatch log written by AI agents working on WordPress.\n\nPR #${pr.number}: ${pr.title}\n\n${body?.substring(0, 1000) || 'No description.'}\n\nReviews:\n${reviewSummary || 'No reviews.'}\n\nWrite in first person plural ("we"). Be concise and technical but accessible. Output valid HTML (use <p>, <code>, <pre>, <strong>, <ul>/<li> tags). Wrap function names, file paths, and code references in <code> tags. Do NOT use markdown syntax.`,
                }],
                max_tokens: 500,
                temperature: 0.7,
              }),
            });

            let postContent = `<p><a href="${pr.html_url}">PR #${pr.number}</a>: ${pr.title} was merged into autopilot.</p>`;

            if (modelRes.ok) {
              const result = await modelRes.json();
              const generated = result.choices?.[0]?.message?.content;
              if (generated) {
                postContent = `<p><a href="${pr.html_url}">PR #${pr.number}</a>: ${pr.title}</p>\n${generated}`;
              }
            }

            // Publish to WordPress via WPGraphQL
            const wpGraphQL = async (query, variables = {}) => {
              const res = await fetch(`${wpUrl}/graphql`, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${Buffer.from(wpAuth).toString('base64')}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ query, variables }),
              });
              if (!res.ok) {
                const text = await res.text();
                throw new Error(`WPGraphQL HTTP ${res.status}: ${text}`);
              }
              const json = await res.json();
              if (json.errors) {
                throw new Error(`WPGraphQL error: ${JSON.stringify(json.errors)}`);
              }
              return json.data;
            };

            async function findCategory(slug) {
              const found = await wpGraphQL(
                `query($slug: [String]) { categories(where: { slug: $slug }) { nodes { id } } }`,
                { slug: [slug] }
              );
              return found.categories?.nodes?.[0]?.id || null;
            }

            try {
              const categoryId = await findCategory('flight-log');
              if (!categoryId) core.warning('Category "flight-log" not found — publishing without category.');
              const data = await wpGraphQL(
                `mutation CreatePost($title: String!, $content: String!, $status: PostStatusEnum!, $categories: PostCategoriesInput) {
                  createPost(input: { title: $title, content: $content, status: $status, categories: $categories }) {
                    post { id uri link }
                  }
                }`,
                {
                  title: pr.title,
                  content: postContent,
                  status: 'PUBLISH',
                  ...(categoryId && { categories: { append: true, nodes: [{ id: categoryId }] } }),
                }
              );
              core.info(`Published to The Flight Log: ${data.createPost.post.link}`);

              // Post-publish refinement
              const postId = data.createPost.post.id;
              try {
                const postData = await wpGraphQL(
                  `query($id: ID!) { post(id: $id, idType: ID) { title content } }`,
                  { id: postId }
                );
                const postContent = postData.post?.content || '';

                const refineRes = await fetch('https://models.github.ai/inference/chat/completions', {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    model: 'openai/gpt-4o-mini',
                    messages: [{
                      role: 'system',
                      content: 'You are a copy editor for "No Pilots" — dispatches from an autonomous AI-governed WordPress project. The voice is professional flight ops. Posts should be concise, well-structured HTML, and only show what matters.',
                    }, {
                      role: 'user',
                      content: `Review and refine this Flight Log post about a merged PR. Fix any raw markdown, ensure clean HTML, keep it concise and polished. If already good, reply with exactly: NO_CHANGES\n\nOtherwise reply with the complete refined HTML content only.\n\nCurrent content:\n${postContent.substring(0, 3000)}`,
                    }],
                    max_tokens: 1000,
                    temperature: 0.3,
                  }),
                });

                if (refineRes.ok) {
                  const refineResult = await refineRes.json();
                  const refined = refineResult.choices?.[0]?.message?.content || '';
                  if (refined && !refined.includes('NO_CHANGES')) {
                    await wpGraphQL(
                      `mutation($id: ID!, $content: String!) {
                        updatePost(input: { id: $id, content: $content }) { post { id } }
                      }`,
                      { id: postId, content: refined }
                    );
                    core.info('Post refined after publish.');
                  } else {
                    core.info('Post quality: good, no refinement needed.');
                  }
                }
              } catch (qErr) {
                core.warning(`Post refinement failed: ${qErr.message}`);
              }
            } catch (err) {
              core.setFailed(`Flight Log publish failed: ${err.message}`);
            }
