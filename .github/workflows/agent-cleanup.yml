name: Agent Cleanup

on:
  pull_request_target:
    types: [closed]

permissions:
  issues: write
  pull-requests: read
  contents: read
  models: read

jobs:
  close-linked-issues:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'autopilot'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup and build Flight Log content
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const branch = pr.head.ref || '';

            // --- Close linked issues ---
            const issueNumbers = new Set();

            const closePatterns = body.match(/(?:closes|fixes|resolves)\s+#(\d+)/gi) || [];
            for (const match of closePatterns) {
              const num = match.match(/#(\d+)/);
              if (num) issueNumbers.add(parseInt(num[1]));
            }

            if (issueNumbers.size === 0) {
              const refs = body.match(/#(\d+)/g) || [];
              for (const ref of refs) {
                const num = parseInt(ref.replace('#', ''));
                if (num > 0 && num < 10000) issueNumbers.add(num);
              }
            }

            if (issueNumbers.size === 0) {
              const branchMatch = branch.match(/(?:copilot|agent)\/(\d+)/) ||
                                  branch.match(/issue-(\d+)/);
              if (branchMatch) issueNumbers.add(parseInt(branchMatch[1]));
            }

            for (const num of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner, repo, issue_number: num,
                });
                if (issue.state !== 'open') continue;
                if (!issue.labels.some(l => l.name === 'agent')) continue;

                await github.rest.issues.update({
                  owner, repo,
                  issue_number: num,
                  state: 'closed',
                  state_reason: 'completed',
                });
                core.info(`Closed issue #${num}.`);
              } catch (e) {
                core.info(`Issue #${num} not found or already closed.`);
              }
            }

            // --- Build Flight Log content ---
            // Get PR review comments for context
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner, repo, pull_number: pr.number,
            });

            const reviewSummary = reviews
              .filter(r => r.body && r.body.length > 10)
              .map(r => `${r.user.login}: ${r.body.split('\n')[0]}`)
              .join('\n');

            // Generate a brief learning summary via Models API
            const modelRes = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: 'openai/gpt-4o-mini',
                messages: [{
                  role: 'user',
                  content: `Write a brief blog post (3-4 paragraphs) about this merged PR for "The Flight Log" — a dispatch log written by AI agents working on WordPress.\n\nPR #${pr.number}: ${pr.title}\n\n${body?.substring(0, 1000) || 'No description.'}\n\nReviews:\n${reviewSummary || 'No reviews.'}\n\nWrite in first person plural ("we"). Be concise and technical but accessible. Output valid HTML (use <p>, <code>, <pre>, <strong>, <ul>/<li> tags). Wrap function names, file paths, and code references in <code> tags. Do NOT use markdown syntax.`,
                }],
                max_tokens: 500,
                temperature: 0.7,
              }),
            });

            let postContent = `<p><a href="${pr.html_url}">PR #${pr.number}</a>: ${pr.title} was merged into autopilot.</p>`;

            if (modelRes.ok) {
              const result = await modelRes.json();
              const generated = result.choices?.[0]?.message?.content;
              if (generated) {
                postContent = `<p><a href="${pr.html_url}">PR #${pr.number}</a>: ${pr.title}</p>\n${generated}`;
              }
            }

            core.exportVariable('FLIGHT_LOG_TITLE', pr.title);
            core.exportVariable('FLIGHT_LOG_CONTENT', postContent);
            core.exportVariable('FLIGHT_LOG_EXCERPT', `PR #${pr.number} merged into autopilot.`);

      - name: Publish to Flight Log
        uses: ./.github/actions/publish-to-flight-log
        with:
          title: ${{ env.FLIGHT_LOG_TITLE }}
          content: ${{ env.FLIGHT_LOG_CONTENT }}
          excerpt: ${{ env.FLIGHT_LOG_EXCERPT }}
          category-slug: log
          author-slug: autopilot
          refine-prompt: 'Review and refine this Flight Log post about a merged PR. Fix any raw markdown, ensure clean HTML, keep it concise and polished.'
          wp-url: ${{ secrets.WP_URL }}
          wp-auth: ${{ secrets.WP_AUTH }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for test coverage gaps
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;

            // Get files changed in merged PR
            const { data: files } = await github.rest.pulls.listFiles({
              owner, repo, pull_number: pr.number, per_page: 100,
            });

            // Identify source files that were modified
            const sourceFiles = files
              .map(f => f.filename)
              .filter(f =>
                (f.startsWith('src/wp-includes/') || f.startsWith('src/wp-admin/')) &&
                f.endsWith('.php') &&
                !f.includes('deprecated')
              );

            // Check if any test files were also modified
            const testFiles = files
              .map(f => f.filename)
              .filter(f => f.startsWith('tests/'));

            if (sourceFiles.length === 0 || testFiles.length > 0) {
              core.info('Test coverage: OK (tests included or no source changes).');
              return;
            }

            // Check for existing coverage issue to avoid duplicates
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'agent', per_page: 50,
            });

            for (const file of sourceFiles.slice(0, 2)) {
              const shortFile = file.replace('src/', '');
              const title = `Add test coverage for ${shortFile}`;

              if (existing.some(i => i.title.toLowerCase() === title.toLowerCase())) {
                core.info(`Coverage issue already exists for ${shortFile}.`);
                continue;
              }

              await github.rest.issues.create({
                owner, repo,
                title,
                body: [
                  `PR #${pr.number} (${pr.title}) modified \`${file}\` but included no test changes.`,
                  '',
                  `**File:** \`${file}\``,
                  `**PR:** ${pr.html_url}`,
                  '',
                  `Review the changes and add test coverage if appropriate.`,
                  `If existing tests already cover these changes, close this issue with an explanation.`,
                ].join('\n'),
                labels: ['agent', 'status:ready'],
              });

              core.info(`Created coverage issue: ${title}`);
            }
