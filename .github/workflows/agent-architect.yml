name: Architect

on:
  push:
    branches: [autopilot]
    paths:
      - '.github/workflows/agent-*.yml'
      - '.github/actions/**'
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: agent-architect
  cancel-in-progress: true

jobs:
  diagram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate architecture diagram
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            // Read all agent workflow files
            const workflowDir = '.github/workflows';
            const files = fs.readdirSync(workflowDir)
              .filter(f => f.startsWith('agent-') && f.endsWith('.yml'));

            const workflows = [];
            for (const file of files) {
              const content = fs.readFileSync(path.join(workflowDir, file), 'utf8');
              const name = content.match(/^name:\s*(.+)/m)?.[1]?.trim() || file;

              // Extract only the on: block (between "on:" and "permissions:" or "jobs:")
              const onBlock = content.match(/^on:\n([\s\S]*?)(?=\n\w)/m)?.[1] || '';
              const triggers = [];

              if (onBlock.includes('schedule:')) triggers.push('schedule');
              if (onBlock.includes('workflow_dispatch')) triggers.push('manual');
              if (onBlock.includes('pull_request_target')) triggers.push('PR event');
              if (onBlock.includes('pull_request_review')) triggers.push('review');
              if (onBlock.includes('issues:')) triggers.push('issue event');
              if (onBlock.includes('push:')) triggers.push('push');
              if (onBlock.includes('check_suite:')) triggers.push('check_suite');
              if (onBlock.includes('discussion')) triggers.push('discussion');

              const tier = file.includes('executive') ? 3
                : (file.includes('qa') || file.includes('metrics') || file.includes('triage')) ? 2
                : 0;

              // Extract cron schedule if present
              const cron = onBlock.match(/cron:\s*'([^']+)'/)?.[1] || '';

              workflows.push({ file, name, triggers, tier, cron });
            }

            // Check for composite actions
            const actionsDir = '.github/actions';
            const actions = [];
            if (fs.existsSync(actionsDir)) {
              const actionDirs = fs.readdirSync(actionsDir);
              for (const dir of actionDirs) {
                const actionFile = path.join(actionsDir, dir, 'action.yml');
                if (fs.existsSync(actionFile)) {
                  actions.push(dir);
                }
              }
            }

            const tier1 = workflows.filter(w => w.tier === 0);
            const tier2 = workflows.filter(w => w.tier === 2);
            const tier3 = workflows.filter(w => w.tier === 3);

            // Generate Mermaid diagram
            const mermaid = [
              '```mermaid',
              'graph TD',
              '',
              '    subgraph "Tier 3 — Executive"',
              ...tier3.map(w => `        ${w.file.replace('agent-', '').replace('.yml', '').toUpperCase()}["${w.name}"]`),
              '    end',
              '',
              '    subgraph "Tier 2 — Supervisors"',
              ...tier2.map(w => `        ${w.file.replace('agent-', '').replace('.yml', '').toUpperCase()}["${w.name}"]`),
              '    end',
              '',
              '    subgraph "Tier 1 — Workers"',
              ...tier1.map(w => `        ${w.file.replace('agent-', '').replace('.yml', '').toUpperCase()}["${w.name}"]`),
              '    end',
              '',
              '    %% Data flows',
              '    ISSUE-GENERATOR -->|status:triage| TRIAGE',
              '    LEARN -->|status:triage| TRIAGE',
              '    TRIAGE -->|status:ready| COORDINATOR',
              '    COORDINATOR -->|assigns| READY["Draft Converter"]',
              '    READY -->|ready_for_review| REVIEW',
              '    REVIEW -->|approve| MERGE["Auto-Merge"]',
              '    REVIEW -->|reject| REVISE',
              '    MERGE -->|merged| CLEANUP',
              '    CLEANUP -->|push to autopilot| QA',
              '    CLEANUP -->|publishes| FL["Flight Log"]',
              '    QA -->|failure| SAFETY',
              '    METRICS -->|data| EXECUTIVE',
              '    EXECUTIVE -->|governance PR| REVIEW',
              '',
              ...actions.map(a => `    %% Composite action: ${a}`),
              '```',
            ].join('\n');

            const now = new Date().toISOString().split('T')[0];
            const doc = [
              '# Architecture',
              '',
              `Auto-generated on ${now} by the Architect workflow. Do not edit manually.`,
              '',
              `## System Overview`,
              '',
              `**${workflows.length} agent workflows** across 3 tiers, plus ${actions.length} composite action(s).`,
              '',
              '## Diagram',
              '',
              mermaid,
              '',
              '## Workflows',
              '',
              '| Name | File | Tier | Triggers | Schedule |',
              '|---|---|---|---|---|',
              ...workflows.map(w => `| ${w.name} | \`${w.file}\` | ${w.tier === 3 ? 'Executive' : w.tier === 2 ? 'Supervisor' : 'Worker'} | ${w.triggers.join(', ')} | ${w.cron ? `\`${w.cron}\`` : '—'} |`),
              '',
              '## Composite Actions',
              '',
              ...actions.map(a => `- \`${a}\``),
              '',
              '## Review Personas',
              '',
              'The Preflight Review workflow uses three AI personas loaded from `.github/agent-personas/`:',
              '',
              '| Persona | Role | Rubric | Checks |',
              '|---|---|---|---|',
              '| Doc | Code Quality | Readability, PHPDoc, Complexity, Tests, Style | Every PR |',
              '| Dalton | Security | Input Sanitization, Output Escaping, SQL Prep, Capability Checks, Nonce Verification, Attack Surface | Every PR |',
              '| Pat | Compatibility + Decision | Function Signatures, Hook Compatibility, Return Types, Deprecation Path | Every PR (final verdict) |',
              '',
              '## Coverage Matrix',
              '',
              '| Component | Operates | Checked By | Checks the Checker | Gap |',
              '|---|---|---|---|---|',
              '| Coding Agents | Write code | Preflight Review (Doc, Dalton, Pat) | Executive (gap detection) | — |',
              '| Coordinator | Assigns issues | Safety (capacity limits) | Executive (gap detection) | — |',
              '| Draft Converter | Converts drafts | Safety (pipeline freeze) | Executive (gap detection) | — |',
              '| Preflight Review | Reviews PRs | Metrics (approval rate) | Executive (aggregate trends) | No per-review audit |',
              '| Doc (persona) | Quality checklist | Metrics (pass rates) | Executive (calibration drift) | No second opinion on individual reviews |',
              '| Dalton (persona) | Security checklist | Metrics (pass rates) | Executive (calibration drift) | No second opinion on individual reviews |',
              '| Pat (persona) | Final decision | Metrics (approval rate) | Executive (trend analysis) | No override mechanism besides human kill switch |',
              '| Triage | Evaluates issues | Executive (rejection rate) | Executive (gap detection) | — |',
              '| QA | Tests merged code | Learn (on failure) | Executive (gap detection) | — |',
              '| Metrics | Tracks numbers | Executive (reads metrics) | Executive (self-check) | — |',
              '| Executive | Strategic assessment | Health Check (connectivity) | Human (kill switch) | Self-referential — no external audit |',
              '| Health Check | System vitals | Executive (gap detection) | Human (manual trigger) | — |',
              '| Learn | Failure analysis | Triage (evaluates output) | Executive (gap detection) | — |',
              '| Architect | System diagram | Preflight Review (PR) | Executive (staleness check) | — |',
              '| Flight Log (blog) | Publishes dispatches | Health Check (blog audit) | Executive (gap detection) | — |',
              '',
              '**Trust terminates at the human.** The kill switch (`system:off` label) halts all tiers immediately.',
              '',
            ].join('\n');

            fs.writeFileSync('ARCHITECTURE.md', doc);
            core.info(`Generated ARCHITECTURE.md with ${workflows.length} workflows.`);

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DOC_APP_ID }}
          private-key: ${{ secrets.DOC_PRIVATE_KEY }}

      - name: Create PR with updated diagram
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name 'nopilots-doc[bot]'
          git config user.email 'nopilots-doc[bot]@users.noreply.github.com'
          git add ARCHITECTURE.md
          if git diff --staged --quiet; then
            echo "No changes to diagram."
            exit 0
          fi
          BRANCH="agent/architecture-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git commit -m 'Update architecture diagram'
          git push origin "$BRANCH"
          gh pr create \
            --repo "${{ github.repository }}" \
            --base autopilot \
            --head "$BRANCH" \
            --title "Update architecture diagram" \
            --body "Auto-generated by the Architect workflow. Updates the Mermaid diagram in ARCHITECTURE.md to reflect current workflow state."
