name: Product Innovator

on:
  schedule:
    - cron: '0 0 * * 2'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read
  contents: read
  models: read

concurrency:
  group: agent-product-innovator
  cancel-in-progress: true

jobs:
  imagine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Propose product innovation
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            // Rate limit
            const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000).toISOString();
            const { data: recentIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'all', labels: 'agent', sort: 'created', direction: 'desc', per_page: 10,
            });
            const recentCount = recentIssues.filter(i => i.created_at > oneHourAgo).length;
            if (recentCount >= 5) {
              core.warning('Rate limit hit. Skipping.');
              return;
            }

            // Check for existing product RFC this week
            const { data: openRFCs } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'type:rfc', per_page: 20,
            });
            const recentProduct = openRFCs.some(i =>
              i.title.startsWith('[Product]') &&
              (Date.now() - new Date(i.created_at)) < 7 * 24 * 60 * 60 * 1000
            );
            if (recentProduct) {
              core.info('Product RFC already open from this week. Skipping.');
              return;
            }

            // Gather context about the WordPress codebase
            const { data: closedPRs } = await github.rest.pulls.list({
              owner, repo, state: 'closed', base: 'autopilot', sort: 'updated', direction: 'desc', per_page: 20,
            });
            const mergedWork = closedPRs
              .filter(pr => pr.merged_at)
              .slice(0, 10)
              .map(pr => `- ${pr.title}`)
              .join('\n');

            // Scan what areas of WordPress the agents have been touching
            const touchedFiles = new Set();
            for (const pr of closedPRs.filter(p => p.merged_at).slice(0, 5)) {
              try {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner, repo, pull_number: pr.number, per_page: 20,
                });
                files.forEach(f => {
                  const dir = f.filename.split('/').slice(0, 3).join('/');
                  touchedFiles.add(dir);
                });
              } catch (e) { /* skip */ }
            }

            const governance = fs.readFileSync('GOVERNANCE.md', 'utf8').substring(0, 1000);
            const vision = fs.existsSync('VISION.md') ? fs.readFileSync('VISION.md', 'utf8') : '';

            const MODELS = ['openai/gpt-4o-mini', 'anthropic/claude-haiku'];
            const model = MODELS[new Date().getHours() % MODELS.length];

            const res = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model,
                messages: [{
                  role: 'system',
                  content: `You are the Product Innovator for No Pilots — an autonomous WordPress project. Your job is to propose ONE improvement to WordPress itself. Not the agent system. The actual WordPress software.

Think about what WordPress users, developers, and site owners need. Think about gaps in WordPress core that nobody has addressed. Think about what would make WordPress fundamentally better — not incremental fixes, but real improvements.

Rules:
- Propose ONE idea only
- It must improve WordPress for end users or developers
- It must be implementable within WordPress core (PHP, JS, REST API, etc.)
- It must respect backwards compatibility per GOVERNANCE.md
- Reference what inspired the idea (recent work, patterns, ecosystem gaps)
- Be specific — name files, APIs, functions where possible
- No AI slop

Respond in this exact format:
TITLE: (short, specific title)
INSIGHT: (what inspired this — one sentence)
PROPOSAL: (what to build — 2-3 sentences)
VALUE: (who benefits and how — one sentence)
FILES: (which WordPress files/areas are involved)`,
                }, {
                  role: 'user',
                  content: `Here is what the agents have been working on. Find a gap in WordPress that nobody has addressed yet.

## Vision
${vision}

## Governance
${governance}

## Recent merged work
${mergedWork || 'None yet.'}

## Areas of the codebase agents have touched
${[...touchedFiles].join('\n') || 'None yet.'}`,
                }],
                max_tokens: 500,
                temperature: 0.8,
              }),
            });

            if (!res.ok) {
              core.warning('Models API unavailable.');
              return;
            }

            const result = await res.json();
            const response = result.choices?.[0]?.message?.content || '';

            const title = response.match(/TITLE:\s*(.+)/)?.[1]?.trim();
            const insight = response.match(/INSIGHT:\s*(.+)/)?.[1]?.trim();
            const proposal = response.match(/PROPOSAL:\s*([\s\S]*?)(?=VALUE:|$)/)?.[1]?.trim();
            const value = response.match(/VALUE:\s*(.+)/)?.[1]?.trim();
            const files = response.match(/FILES:\s*(.+)/)?.[1]?.trim();

            if (!title || !proposal) {
              core.warning('Could not parse product proposal.');
              return;
            }

            await github.rest.issues.create({
              owner, repo,
              title: `[Product] ${title}`,
              body: [
                `The Product Innovator proposes a WordPress improvement.`,
                '',
                `**Insight:** ${insight || 'Not specified.'}`,
                '',
                `## Proposal`,
                '',
                proposal,
                '',
                `**Value:** ${value || 'Not specified.'}`,
                `**Files:** ${files || 'Not specified.'}`,
                '',
                `This is an RFC. Evaluate whether this improvement aligns with WordPress principles and is worth implementing.`,
              ].join('\n'),
              labels: ['agent', 'type:rfc', 'status:triage'],
            });

            core.info(`Product innovation proposed: ${title}`);
