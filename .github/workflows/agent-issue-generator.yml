name: Agent Issue Generator

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: agent-issue-generator
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan codebase and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check how many open agent issues exist
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'agent',
              per_page: 100,
            });

            const maxOpen = 20;
            const available = maxOpen - openIssues.length;

            if (available <= 0) {
              core.info('At issue limit. Skipping generation.');
              return;
            }

            // Get existing issue titles to avoid duplicates
            const { data: allIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'all',
              labels: 'agent',
              per_page: 100,
            });
            const existingTitles = allIssues.map(i => i.title.toLowerCase());

            const newIssues = [];

            // 1. Scan for @todo and TODO comments in core PHP files
            try {
              const todos = execSync(
                'grep -rn "@todo\\|TODO\\|FIXME" src/wp-includes/ src/wp-admin/ --include="*.php" | grep -v vendor | grep -v node_modules | grep -v deprecated.php | grep -v ID3 | grep -v SimplePie | head -20',
                { encoding: 'utf8', timeout: 30000 }
              ).trim().split('\n').filter(Boolean);

              for (const line of todos) {
                const match = line.match(/^([^:]+):(\d+):(.+)$/);
                if (!match) continue;

                const [, file, lineNum, content] = match;
                const cleanContent = content.replace(/.*(@todo|TODO|FIXME)\s*/i, '').trim();
                const shortFile = file.replace('src/', '');

                if (cleanContent.length < 10) continue;

                const title = `Address TODO in ${shortFile}: ${cleanContent.substring(0, 80)}`;
                if (existingTitles.includes(title.toLowerCase())) continue;

                newIssues.push({
                  title,
                  body: [
                    `Found a \`@todo\` comment in the codebase that needs attention.`,
                    '',
                    `**File:** \`${file}\``,
                    `**Line:** ${lineNum}`,
                    `**Comment:** \`${cleanContent}\``,
                    '',
                    `Investigate this TODO, implement a solution if appropriate, and include PHPUnit tests.`,
                    `If the TODO is no longer relevant, remove it and explain why in the PR description.`,
                  ].join('\n'),
                });

                if (newIssues.length >= 3) break;
              }
            } catch (e) {
              core.info(`TODO scan: ${e.message}`);
            }

            // 2. Find PHP functions missing PHPDoc blocks
            if (newIssues.length < 3) {
              try {
                const undocumented = execSync(
                  'grep -rn "^function \\|^\tfunction \\|^\\tpublic function \\|^\\tprivate function \\|^\\tprotected function " src/wp-includes/ --include="*.php" | grep -v deprecated.php | grep -v ID3 | grep -v SimplePie | head -50',
                  { encoding: 'utf8', timeout: 30000 }
                ).trim().split('\n').filter(Boolean);

                for (const line of undocumented) {
                  const match = line.match(/^([^:]+):(\d+):(.+)$/);
                  if (!match) continue;

                  const [, file, lineNum, content] = match;
                  const funcMatch = content.match(/function\s+(\w+)/);
                  if (!funcMatch) continue;

                  const funcName = funcMatch[1];
                  const shortFile = file.replace('src/', '');

                  // Check if the line before has a PHPDoc block ending
                  try {
                    const context = execSync(
                      `sed -n '${Math.max(1, parseInt(lineNum) - 2)},${lineNum}p' ${file}`,
                      { encoding: 'utf8', timeout: 5000 }
                    );
                    if (context.includes('*/')) continue; // Has PHPDoc
                  } catch (e) { continue; }

                  const title = `Add PHPDoc documentation for ${funcName}() in ${shortFile}`;
                  if (existingTitles.includes(title.toLowerCase())) continue;

                  newIssues.push({
                    title,
                    body: [
                      `The function \`${funcName}()\` in \`${file}\` is missing PHPDoc documentation.`,
                      '',
                      `Add a complete PHPDoc block following [WordPress Inline Documentation Standards](https://make.wordpress.org/core/handbook/best-practices/inline-documentation-standards/php/).`,
                      '',
                      `Include: summary, description if needed, \`@param\` for all parameters, and \`@return\`.`,
                    ].join('\n'),
                  });

                  if (newIssues.length >= 3) break;
                }
              } catch (e) {
                core.info(`PHPDoc scan: ${e.message}`);
              }
            }

            // Create the issues
            let created = 0;
            for (const issue of newIssues.slice(0, Math.min(3, available))) {
              try {
                await github.rest.issues.create({
                  owner, repo,
                  title: issue.title,
                  body: issue.body,
                  labels: ['agent', 'status:ready'],
                });
                created++;
              } catch (e) {
                core.warning(`Failed to create issue: ${e.message}`);
              }
            }

            core.info(`Created ${created} new issues.`);
