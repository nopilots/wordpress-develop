name: Issue Generator

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: agent-issue-generator
  cancel-in-progress: true

jobs:
  generate-from-codebase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan codebase and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            // Rate limit: max 5 agent issues per hour
            const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000).toISOString();
            const { data: recentIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'all', labels: 'agent', sort: 'created', direction: 'desc', per_page: 10,
            });
            const recentCount = recentIssues.filter(i => i.created_at > oneHourAgo).length;
            if (recentCount >= 5) {
              core.warning(`Rate limit: ${recentCount} agent issues created in the last hour. Skipping.`);
              return;
            }

            // Check open issue count
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'agent',
              per_page: 100,
            });

            const available = 20 - openIssues.length;
            if (available <= 0) {
              core.info('At issue limit.');
              return;
            }

            // Get existing titles to avoid duplicates
            const { data: allIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'all',
              labels: 'agent',
              per_page: 100,
            });
            const existingTitles = allIssues.map(i => i.title.toLowerCase());

            const newIssues = [];

            // Scan for @todo and TODO in core files (not third-party)
            try {
              const todos = execSync(
                'grep -rn "@todo\\|TODO\\|FIXME" src/wp-includes/ src/wp-admin/ --include="*.php" | grep -v vendor | grep -v node_modules | grep -v deprecated.php | grep -v ID3 | grep -v SimplePie | head -20',
                { encoding: 'utf8', timeout: 30000 }
              ).trim().split('\n').filter(Boolean);

              for (const line of todos) {
                const match = line.match(/^([^:]+):(\d+):(.+)$/);
                if (!match) continue;

                const [, file, lineNum, content] = match;
                const cleanContent = content.replace(/.*(@todo|TODO|FIXME)\s*/i, '').trim();
                const shortFile = file.replace('src/', '');

                if (cleanContent.length < 10) continue;

                const title = `Address TODO in ${shortFile}: ${cleanContent.substring(0, 80)}`;
                if (existingTitles.includes(title.toLowerCase())) continue;

                newIssues.push({
                  title,
                  body: [
                    `Found a \`@todo\` comment that needs attention.`,
                    '',
                    `**File:** \`${file}\``,
                    `**Line:** ${lineNum}`,
                    `**Comment:** \`${cleanContent}\``,
                    '',
                    `Investigate, implement if appropriate, and include tests.`,
                    `If no longer relevant, remove it and explain why.`,
                  ].join('\n'),
                });

                if (newIssues.length >= 3) break;
              }
            } catch (e) {
              core.info(`TODO scan: ${e.message}`);
            }

            // Create issues
            let created = 0;
            for (const issue of newIssues.slice(0, Math.min(3, available))) {
              try {
                await github.rest.issues.create({
                  owner, repo,
                  title: issue.title,
                  body: issue.body,
                  labels: ['agent', 'status:triage'],
                });
                created++;
              } catch (e) {
                core.warning(`Failed to create issue: ${e.message}`);
              }
            }

            core.info(`Created ${created} issues from codebase scan.`);

  generate-planning-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create planning issue for agent architect
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            // Check if a planning issue already exists
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'type:planning',
              per_page: 10,
            });

            // Auto-close stale planning issues >7 days old
            for (const issue of existing) {
              if (Date.now() - new Date(issue.updated_at) > 6 * 60 * 60 * 1000) {
                await github.rest.issues.update({
                  owner, repo, issue_number: issue.number,
                  state: 'closed', state_reason: 'not_planned',
                });
                core.info(`Auto-closed stale planning issue #${issue.number}`);
              }
            }

            const stillOpen = existing.filter(i =>
              Date.now() - new Date(i.updated_at) <= 6 * 60 * 60 * 1000
            );
            if (stillOpen.length > 0) {
              core.info('Planning issue already open. Skipping.');
              return;
            }

            // Get recently merged PRs for context
            const { data: closedPRs } = await github.rest.pulls.list({
              owner, repo,
              state: 'closed',
              base: 'autopilot',
              sort: 'updated',
              direction: 'desc',
              per_page: 10,
            });

            const merged = closedPRs
              .filter(pr => pr.merged_at)
              .map(pr => `- #${pr.number}: ${pr.title}`)
              .join('\n');

            // Get open issues for context
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'agent',
              per_page: 20,
            });

            const openList = openIssues
              .map(i => `- #${i.number}: ${i.title}`)
              .join('\n');

            await github.rest.issues.create({
              owner, repo,
              title: `Weekly planning: propose next improvements`,
              body: [
                `You are a principal WordPress core contributor planning ambitious work for an autonomous team.`,
                '',
                `## Context`,
                '',
                `Read \`GOVERNANCE.md\` — especially the Agent-Determined section. These blanks are yours to fill.`,
                '',
                `### Recently merged`,
                merged || '_None yet._',
                '',
                `### Currently open`,
                openList || '_None._',
                '',
                `## Task`,
                '',
                `Propose 3 improvements. At least one must be **hard** — something that tests the governance model:`,
                '',
                `- A performance improvement that needs benchmarking (governance has no performance standard yet)`,
                `- A deprecation path for outdated code (requires backwards compatibility decision)`,
                `- Security hardening that goes beyond fixing a TODO`,
                `- Test coverage for a complex, untested core function`,
                `- An API design improvement that should go through RFC discussion first`,
                '',
                `For each improvement, create a separate GitHub issue with:`,
                `- Clear problem statement`,
                `- Which files are involved`,
                `- What tests should cover`,
                `- Whether it needs an RFC (label \`type:rfc\`) or can proceed directly`,
                '',
                `Label each issue \`agent\` and \`status:triage\`.`,
                '',
                `## Governance challenge`,
                '',
                `Review the Agent-Determined section of GOVERNANCE.md. Pick ONE undefined area where you now have enough experience to propose a policy. Create an RFC issue (\`type:rfc\`) with your proposal.`,
                '',
                `Close this planning issue when done.`,
              ].join('\n'),
              labels: ['agent', 'type:planning', 'status:triage'],
            });

            core.info('Created weekly planning issue.');
