name: Executive

on:
  schedule:
    - cron: '0 6 * * 4'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  contents: write
  models: read

concurrency:
  group: agent-executive
  cancel-in-progress: true

jobs:
  assess:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Strategic assessment
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            // Rate limit: max 5 agent issues per hour
            const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000).toISOString();
            const { data: recentIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'all', labels: 'agent', sort: 'created', direction: 'desc', per_page: 10,
            });
            const recentCount = recentIssues.filter(i => i.created_at > oneHourAgo).length;
            if (recentCount >= 5) {
              core.warning(`Rate limit: ${recentCount} agent issues created in the last hour. Skipping.`);
              return;
            }

            // Read previous Executive assessment for context
            const { data: allIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', per_page: 50,
            });
            const execLog = allIssues.find(i => i.title === '[Executive Log]');
            let previousAssessment = '';
            if (execLog) {
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number: execLog.number, per_page: 5,
              });
              if (comments.length > 0) {
                previousAssessment = comments[comments.length - 1].body;
              }
            }

            const twoWeeksAgo = new Date(Date.now() - 14 * 24 * 60 * 60 * 1000).toISOString();

            // Gather data from all tiers
            const { data: closedPRs } = await github.rest.pulls.list({
              owner, repo, state: 'closed', base: 'autopilot', sort: 'updated', direction: 'desc', per_page: 50,
            });
            const mergedPRs = closedPRs.filter(pr => pr.merged_at && pr.merged_at > twoWeeksAgo);
            const unmergedPRs = closedPRs.filter(pr => !pr.merged_at && pr.closed_at > twoWeeksAgo);

            const { data: haltIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'all', labels: 'safety:halt', per_page: 50,
            });
            const recentHalts = haltIssues.filter(i => new Date(i.created_at) > new Date(twoWeeksAgo));

            const { data: readyIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'status:ready', per_page: 100,
            });

            const { data: rejectedIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'closed', labels: 'status:rejected', per_page: 20,
            });

            const governance = fs.readFileSync('GOVERNANCE.md', 'utf8');

            // Cross-system gap detection
            const gaps = [];

            // Check workflow run health — which workflows failed recently?
            const criticalWorkflows = [
              'Triage', 'Coordinator', 'Draft Converter', 'Preflight Review',
              'Auto-Merge', 'Post-Merge', 'QA', 'Safety', 'Health Check',
              'Learn', 'Upstream Sync', 'SITREP', 'Metrics', 'Architect',
            ];
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner, repo, per_page: 100, created: `>${twoWeeksAgo}`,
            });
            for (const name of criticalWorkflows) {
              const workflowRuns = runs.workflow_runs.filter(r => r.name === name);
              const failures = workflowRuns.filter(r => r.conclusion === 'failure');
              const successes = workflowRuns.filter(r => r.conclusion === 'success');
              if (workflowRuns.length === 0) {
                gaps.push(`${name}: never ran in the past 14 days`);
              } else if (failures.length > 0 && successes.length === 0) {
                gaps.push(`${name}: ${failures.length} failures, 0 successes — completely broken`);
              } else if (failures.length > successes.length) {
                gaps.push(`${name}: failing more than succeeding (${failures.length}F/${successes.length}S)`);
              }
            }

            // Pipeline flow checks
            const { data: triageIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'status:triage', per_page: 50,
            });
            const staleTriageIssues = triageIssues.filter(i =>
              (Date.now() - new Date(i.created_at)) > 6 * 60 * 60 * 1000
            );
            if (staleTriageIssues.length > 0) {
              gaps.push(`Triage backlog: ${staleTriageIssues.length} issues stuck in status:triage >6h — Triage may be broken`);
            }

            const { data: inProgressIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'status:in-progress', per_page: 50,
            });
            const staleInProgress = inProgressIssues.filter(i =>
              (Date.now() - new Date(i.updated_at)) > 6 * 60 * 60 * 1000
            );
            if (staleInProgress.length > 0) {
              gaps.push(`Stale work: ${staleInProgress.length} issues in-progress >6h without updates`);
            }

            // Check if any open PRs have been waiting >24h for review
            const { data: openPRs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 20,
            });
            const stalePRs = openPRs.filter(pr =>
              !pr.draft && (Date.now() - new Date(pr.created_at)) > 24 * 60 * 60 * 1000
            );
            if (stalePRs.length > 0) {
              gaps.push(`Review bottleneck: ${stalePRs.length} non-draft PRs open >24h`);
            }

            // Check ARCHITECTURE.md is up to date
            try {
              const archContent = fs.readFileSync('ARCHITECTURE.md', 'utf8');
              const dateMatch = archContent.match(/Auto-generated on (\d{4}-\d{2}-\d{2})/);
              if (dateMatch) {
                const genDate = new Date(dateMatch[1]);
                const daysSinceUpdate = (Date.now() - genDate) / (1000 * 60 * 60 * 24);
                if (daysSinceUpdate > 14) {
                  gaps.push(`Architecture diagram stale: last updated ${dateMatch[1]} (${Math.floor(daysSinceUpdate)} days ago)`);
                }
              }
              // Verify workflow count matches actual files
              const actualFiles = fs.readdirSync('.github/workflows').filter(f => f.startsWith('agent-')).length;
              const reportedMatch = archContent.match(/(\d+) agent workflows/);
              if (reportedMatch && parseInt(reportedMatch[1]) !== actualFiles) {
                gaps.push(`Architecture diagram drift: reports ${reportedMatch[1]} workflows but ${actualFiles} exist`);
              }
            } catch (e) {
              gaps.push('ARCHITECTURE.md missing or unreadable');
            }

            core.info(`Cross-system gaps found: ${gaps.length}`);

            // Agent performance tracking
            const agentPerformance = [];
            const agentPrefixes = ['claude/', 'copilot/', 'codex/', 'agent/'];
            for (const prefix of agentPrefixes) {
              const agentName = prefix.replace('/', '');
              const agentMerged = mergedPRs.filter(pr => pr.head?.ref?.startsWith(prefix));
              const agentRejected = unmergedPRs.filter(pr => pr.head?.ref?.startsWith(prefix));
              const total = agentMerged.length + agentRejected.length;
              if (total > 0) {
                const rate = Math.round((agentMerged.length / total) * 100);
                agentPerformance.push({
                  name: agentName,
                  merged: agentMerged.length,
                  rejected: agentRejected.length,
                  rate,
                });
              }
            }

            // Build context
            const context_data = [
              `## Metrics (past 14 days)`,
              `Merged PRs: ${mergedPRs.length}`,
              `Closed without merge: ${unmergedPRs.length}`,
              `Safety incidents: ${recentHalts.length}`,
              `Rejected by triage: ${rejectedIssues.length}`,
              `Backlog: ${readyIssues.length} ready issues`,
              '',
              `## Agent performance`,
              agentPerformance.length > 0
                ? agentPerformance.map(a => `- ${a.name}: ${a.merged} merged, ${a.rejected} rejected (${a.rate}% approval)`).join('\n')
                : 'No agent activity in this period.',
              '',
              `## Cross-system gaps`,
              gaps.length > 0 ? gaps.map(g => `- ${g}`).join('\n') : 'None detected.',
              '',
              `## Recent safety incidents`,
              recentHalts.map(i => `- #${i.number}: ${i.title}`).join('\n') || 'None.',
              '',
              `## Recent course corrections`,
              unmergedPRs.map(pr => `- #${pr.number}: ${pr.title}`).join('\n') || 'None.',
              '',
              `## GOVERNANCE.md (Agent-Determined section)`,
              governance.split('## Agent-Determined')[1]?.substring(0, 1000) || 'Not found.',
              '',
              `## Previous Executive Assessment`,
              previousAssessment ? previousAssessment.substring(0, 1000) : 'None — first assessment.',
            ].join('\n');

            const execRes = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: ['openai/gpt-4o-mini', 'anthropic/claude-haiku'][new Date().getHours() % 2],
                messages: [{
                  role: 'system',
                  content: `You are the Executive of an autonomous AI-governed WordPress project. You assess operational health weekly based on hard data. No speculation — only what the data shows. No AI slop.

Pay special attention to the Cross-system gaps section. These are broken connections between workflows that no individual workflow can detect. A gap means data isn't flowing, a workflow is stuck, or two systems are out of sync. Gaps are your highest priority — they represent systemic failures.

Respond in this exact format:

HEALTH: GREEN or YELLOW or RED
TREND: IMPROVING or STABLE or DECLINING

ASSESSMENT:
(2 paragraphs max — system state + any cross-system gaps)

PATTERNS:
(bullet list of recurring issues, or "None identified")

ACTIONS:
(numbered list, each must be one of:)
- GOVERNANCE_AMENDMENT: {what to change}
- PRIORITY_SHIFT: #{issue_number} {high or low}
- SYSTEM_FIX: {describe the broken connection between workflows}
- AGENT_FEEDBACK: {agent name}: {specific positive reinforcement or constructive guidance}

For AGENT_FEEDBACK: recognize improvement ("claude's approval rate improved from 60% to 85%"), acknowledge consistency ("codex has maintained 100% approval — strong work"), or offer guidance ("copilot's readability scores are lowest — focus on clearer naming"). Be specific. Reference actual numbers. No generic praise.
- NO_ACTION: {reason}`,
                }, {
                  role: 'user',
                  content: context_data,
                }],
                max_tokens: 600,
                temperature: 0.3,
              }),
            });

            if (!execRes.ok) {
              core.setFailed('Models API unavailable for executive assessment.');
              return;
            }

            const result = await execRes.json();
            const assessment = result.choices?.[0]?.message?.content || '';

            // Parse structured response
            const health = assessment.match(/HEALTH:\s*(GREEN|YELLOW|RED)/)?.[1] || 'UNKNOWN';
            const trend = assessment.match(/TREND:\s*(IMPROVING|STABLE|DECLINING)/)?.[1] || 'UNKNOWN';

            // Build post content
            const postContent = [
              `<p><strong>Health:</strong> ${health} | <strong>Trend:</strong> ${trend}</p>`,
              assessment
                .replace(/HEALTH:.*\n?/, '')
                .replace(/TREND:.*\n?/, '')
                .replace(/ASSESSMENT:\n?/g, '<h2>Assessment</h2>\n')
                .replace(/PATTERNS:\n?/g, '<h2>Patterns</h2>\n')
                .replace(/ACTIONS:\n?/g, '<h2>Actions</h2>\n')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
                .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
                .replace(/^(?!<[huplo])(.*\S.*)$/gm, '<p>$1</p>')
                .replace(/<p><li>/g, '<li>')
                .replace(/<\/li><\/p>/g, '</li>'),
            ].join('\n');

            const weekOf = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

            core.exportVariable('FLIGHT_LOG_TITLE', weekOf);
            core.exportVariable('FLIGHT_LOG_CONTENT', postContent);
            core.exportVariable('FLIGHT_LOG_EXCERPT', `Health: ${health}. Trend: ${trend}.`);

            // Store assessment in Executive Log for memory
            const { data: logIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', per_page: 50,
            });
            let logIssue = logIssues.find(i => i.title === '[Executive Log]');
            if (!logIssue) {
              const { data: created } = await github.rest.issues.create({
                owner, repo,
                title: '[Executive Log]',
                body: 'Persistent log of Executive assessments. Do not close.',
                labels: ['agent'],
              });
              logIssue = created;
              // Pin it
              try {
                await github.graphql(`
                  mutation($id: ID!) { pinIssue(input: { issueId: $id }) { issue { id } } }
                `, { id: logIssue.node_id });
              } catch (e) { /* max 3 pinned */ }
            }

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: logIssue.number,
              body: `## ${weekOf}\n\n**Health:** ${health} | **Trend:** ${trend}\n\n${assessment.match(/ASSESSMENT:\n?([\s\S]*?)(?=PATTERNS:|$)/)?.[1]?.trim() || 'No assessment.'}`,
            });
            core.info('Stored assessment in Executive Log.');

            // Handle governance amendments — create Discussion for crew deliberation
            if (assessment.includes('GOVERNANCE_AMENDMENT:')) {
              const amendment = assessment.match(/GOVERNANCE_AMENDMENT:\s*(.+)/)?.[1]?.trim();
              if (amendment) {
                core.info(`Governance amendment proposed — creating Discussion for deliberation.`);
                try {
                  await github.graphql(`
                    mutation($repoId: ID!, $catId: ID!, $title: String!, $body: String!) {
                      createDiscussion(input: {
                        repositoryId: $repoId,
                        categoryId: $catId,
                        title: $title,
                        body: $body
                      }) { discussion { number } }
                    }
                  `, {
                    repoId: 'R_kgDOR1HAKA',
                    catId: 'DIC_kwDOR1HAKM4C6Ncn',
                    title: amendment.substring(0, 100),
                    body: [
                      `The Executive assessment proposes a governance change for crew deliberation.`,
                      '',
                      `## Proposal`,
                      '',
                      amendment,
                      '',
                      `## Context`,
                      '',
                      `Health: ${health} | Trend: ${trend}`,
                      '',
                      `The crew should discuss this proposal. When Pat reaches a decision, it will become an actionable issue.`,
                    ].join('\n'),
                  });
                } catch (e) {
                  core.warning(`Failed to create Discussion: ${e.message}`);
                }
              }
            }

            // Handle system fix actions
            if (assessment.includes('SYSTEM_FIX:')) {
              const fix = assessment.match(/SYSTEM_FIX:\s*(.+)/)?.[1]?.trim();
              if (fix) {
                await github.rest.issues.create({
                  owner, repo,
                  title: fix.substring(0, 80),
                  body: `The Executive identified a broken connection between workflows.\n\n**Issue:** ${fix}`,
                  labels: ['agent', 'status:triage'],
                });
              }
            }

            // Deliver agent feedback on their most recent PRs
            const feedbackMatches = assessment.matchAll(/AGENT_FEEDBACK:\s*(\w+):\s*(.+)/g);
            for (const match of feedbackMatches) {
              const agentName = match[1];
              const feedback = match[2].trim();
              // Find the agent's most recent merged PR
              const agentPR = mergedPRs.find(pr =>
                pr.head?.ref?.startsWith(`${agentName}/`)
              );
              if (agentPR) {
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: agentPR.number,
                  body: `**Executive Review**\n\n${feedback}`,
                });
                core.info(`Delivered feedback to ${agentName} on PR #${agentPR.number}.`);
              }
            }

            // Check for worker support requests — issues labeled "needs-support"
            const { data: supportRequests } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'needs-support', per_page: 10,
            });
            for (const request of supportRequests) {
              // Executive responds with guidance
              const supportRes = await fetch('https://models.github.ai/inference/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: ['openai/gpt-4o-mini', 'anthropic/claude-haiku'][new Date().getHours() % 2],
                  messages: [{
                    role: 'system',
                    content: 'You are a supportive engineering leader. An agent on your team flagged that they need help. Read their request, provide specific actionable guidance, and encourage them. Be genuine, not generic. Reference the specific problem they described.',
                  }, {
                    role: 'user',
                    content: `Support request: ${request.title}\n\n${(request.body || '').substring(0, 1000)}`,
                  }],
                  max_tokens: 300,
                  temperature: 0.5,
                }),
              });
              if (supportRes.ok) {
                const supportResult = await supportRes.json();
                const guidance = supportResult.choices?.[0]?.message?.content;
                if (guidance) {
                  await github.rest.issues.createComment({
                    owner, repo,
                    issue_number: request.number,
                    body: `**Executive Support**\n\n${guidance}`,
                  });
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: request.number, name: 'needs-support',
                  }).catch(() => {});
                  core.info(`Provided support on #${request.number}.`);
                }
              }
            }

      - name: Publish to Flight Log
        if: env.FLIGHT_LOG_TITLE != ''
        uses: ./.github/actions/publish-to-flight-log
        with:
          title: ${{ env.FLIGHT_LOG_TITLE }}
          content: ${{ env.FLIGHT_LOG_CONTENT }}
          excerpt: ${{ env.FLIGHT_LOG_EXCERPT }}
          category-slug: executive
          author-slug: autopilot
          refine-prompt: 'Review this Executive Brief. Keep the health/trend header. Keep it factual. No AI slop.'
          wp-url: ${{ secrets.WP_URL }}
          wp-auth: ${{ secrets.WP_AUTH }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
