name: Learn

on:
  issues:
    types: [closed]
  pull_request_target:
    types: [closed]
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read
  models: read

concurrency:
  group: agent-learn
  cancel-in-progress: true

jobs:
  learn-from-failure:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'issues' ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.merged == false)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read corrections from Flight Log
        id: read-corrections
        uses: ./.github/actions/read-from-flight-log
        with:
          category-slug: corrections
          count: '5'
          wp-url: ${{ secrets.WP_URL }}
          wp-auth: ${{ secrets.WP_AUTH }}

      - name: Analyze failure and create preventive issue
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CORRECTIONS_CONTEXT: ${{ steps.read-corrections.outputs.summary }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            // Rate limit: max 5 agent issues per hour
            const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000).toISOString();
            const { data: recentIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'all', labels: 'agent', sort: 'created', direction: 'desc', per_page: 10,
            });
            const recentCount = recentIssues.filter(i => i.created_at > oneHourAgo).length;
            if (recentCount >= 5) {
              core.warning(`Rate limit: ${recentCount} agent issues created in the last hour. Skipping.`);
              return;
            }

            // Determine what failed
            let failureContext = '';
            let failureTitle = '';

            if (context.payload.issue) {
              // Only process issues with safety:halt label
              if (!context.payload.issue.labels?.some(l => l.name === 'safety:halt')) {
                core.info('Issue closed without safety:halt. Skipping.');
                return;
              }
              const issue = context.payload.issue;
              if (!issue.labels.some(l => l.name === 'safety:halt')) return;
              failureContext = `Issue #${issue.number}: ${issue.title}\n\n${issue.body || ''}`;
              failureTitle = issue.title;
            } else if (context.payload.pull_request) {
              const pr = context.payload.pull_request;
              if (pr.merged) return; // Merged PRs aren't failures

              // Get review comments for context on why it was rejected
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner, repo, pull_number: pr.number,
              });
              const rejections = reviews
                .filter(r => r.state === 'CHANGES_REQUESTED' || r.state === 'DISMISSED')
                .map(r => `${r.user.login}: ${r.body || 'No comment.'}`)
                .join('\n');

              // Get changed files
              const { data: files } = await github.rest.pulls.listFiles({
                owner, repo, pull_number: pr.number, per_page: 50,
              });
              const changedFiles = files.map(f => f.filename).join(', ');

              failureContext = `PR #${pr.number}: ${pr.title}\n\nFiles: ${changedFiles}\n\nReview feedback:\n${rejections || 'No reviews.'}`;
              failureTitle = pr.title;
            } else if (context.eventName === 'workflow_dispatch') {
              // Manual trigger — analyze recent failures
              const { data: recentHalts } = await github.rest.issues.listForRepo({
                owner, repo, state: 'closed', labels: 'safety:halt', per_page: 5,
              });
              const { data: recentClosedPRs } = await github.rest.pulls.list({
                owner, repo, state: 'closed', base: 'autopilot', per_page: 10,
              });
              const unmerged = recentClosedPRs.filter(pr => !pr.merged_at).slice(0, 3);

              if (recentHalts.length === 0 && unmerged.length === 0) {
                core.info('No recent failures to learn from.');
                return;
              }

              failureContext = [
                '## Recent safety halts',
                ...recentHalts.map(i => `- #${i.number}: ${i.title}`),
                '',
                '## Recently closed PRs (not merged)',
                ...unmerged.map(pr => `- #${pr.number}: ${pr.title}`),
              ].join('\n');
              failureTitle = 'recent failures';
            }

            if (!failureContext) return;

            // Ask Models API to analyze the failure
            const analysisRes = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: ['openai/gpt-4o-mini', 'anthropic/claude-haiku'][new Date().getHours() % 2],
                messages: [{
                  role: 'system',
                  content: `You are a systems reliability engineer analyzing failures in an autonomous AI-governed WordPress project. Rules:
- Only propose preventive measures that DON'T ALREADY EXIST in the system
- If the failure was caused by a permission error, GitHub API limitation, or transient issue — respond with SKIP
- If a guard already exists for this failure type (File Guard, Branch Guard, Safety circuit breaker) — respond with SKIP
- Be specific about the technical root cause, not a restatement of the error message
- Recent corrections already published (avoid duplicating these):
${process.env.CORRECTIONS_CONTEXT || 'None.'}`,
                }, {
                  role: 'user',
                  content: `Analyze this failure. If the existing system already handles it or it's a transient error, respond with exactly: SKIP\n\nOtherwise propose ONE preventive improvement.\n\nFailure:\n${failureContext.substring(0, 2000)}\n\nRespond with:\nSKIP (if already handled or transient)\nor:\nROOT_CAUSE: (specific technical cause)\nPREVENTION: (specific fix that doesn't duplicate existing guards)\nTITLE: (short issue title)`,
                }],
                max_tokens: 300,
                temperature: 0.3,
              }),
            });

            if (!analysisRes.ok) {
              core.warning('Models API unavailable for failure analysis.');
              return;
            }

            const result = await analysisRes.json();
            const analysis = result.choices?.[0]?.message?.content || '';

            // Skip if the model determined it's already handled or transient
            if (analysis.includes('SKIP')) {
              core.info('Failure already handled by existing system or transient. Skipping.');
              return;
            }

            const rootCause = analysis.match(/ROOT_CAUSE:\s*(.+)/)?.[1]?.trim();
            const prevention = analysis.match(/PREVENTION:\s*(.+)/)?.[1]?.trim();
            const title = analysis.match(/TITLE:\s*(.+)/)?.[1]?.trim();

            if (!rootCause || !prevention || !title) {
              core.info('Could not parse failure analysis. Skipping.');
              return;
            }

            // Check for duplicate
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'agent', per_page: 50,
            });
            if (existingIssues.some(i => i.title.toLowerCase() === title.toLowerCase())) {
              core.info(`Duplicate issue: "${title}". Skipping.`);
              return;
            }

            await github.rest.issues.create({
              owner, repo,
              title,
              body: [
                `A failure was detected and analyzed automatically.`,
                '',
                `**Root cause:** ${rootCause}`,
                `**Prevention:** ${prevention}`,
                '',
                `## Original failure`,
                '',
                failureContext.substring(0, 1000),
              ].join('\n'),
              labels: ['agent', 'status:triage'],
            });

            core.info(`Created preventive issue: ${title}`);
