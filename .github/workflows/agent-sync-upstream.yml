name: Sync Upstream Trunk

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Kill switch
        uses: actions/github-script@v7
        with:
          script: |
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'system:off',
              per_page: 1,
            });
            if (killSwitch.length > 0) {
              core.info('System is off.');
              process.exit(0);
            }

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PAT_APP_ID }}
          private-key: ${{ secrets.PAT_PRIVATE_KEY }}

      - name: Sync trunk with upstream
        run: gh repo sync ${{ github.repository }} -b trunk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout autopilot
        uses: actions/checkout@v4
        with:
          ref: autopilot
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge trunk into autopilot
        id: merge
        run: |
          git fetch origin trunk
          if git merge origin/trunk --no-edit; then
            git push origin autopilot
            echo "result=success" >> $GITHUB_OUTPUT
          else
            git merge --abort
            echo "result=conflict" >> $GITHUB_OUTPUT
          fi

      - name: Detect version bump
        id: version-check
        if: steps.merge.outputs.result == 'success'
        run: |
          CURRENT_VERSION=$(grep -oP "\\\$wp_version = '\K[^']+" src/wp-includes/version.php || echo "unknown")
          PREVIOUS_VERSION=$(git show HEAD~1:src/wp-includes/version.php 2>/dev/null | grep -oP "\\\$wp_version = '\K[^']+" || echo "unknown")
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "previous=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ] && [ "$CURRENT_VERSION" != "unknown" ] && [ "$PREVIOUS_VERSION" != "unknown" ]; then
            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish release notes
        if: steps.version-check.outputs.bumped == 'true'
        uses: actions/github-script@v7
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_AUTH: ${{ secrets.WP_AUTH }}
          CURRENT_VERSION: ${{ steps.version-check.outputs.current }}
          PREVIOUS_VERSION: ${{ steps.version-check.outputs.previous }}
        with:
          script: |
            const wpUrl = process.env.WP_URL;
            const wpAuth = process.env.WP_AUTH;
            if (!wpUrl || !wpAuth) {
              core.info('WP credentials not set. Skipping blog post.');
              return;
            }

            const wpGraphQL = async (query, variables = {}) => {
              const res = await fetch(`${wpUrl}/graphql`, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${Buffer.from(wpAuth).toString('base64')}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ query, variables }),
              });
              if (!res.ok) {
                const text = await res.text();
                throw new Error(`WPGraphQL HTTP ${res.status}: ${text}`);
              }
              const json = await res.json();
              if (json.errors) {
                throw new Error(`WPGraphQL error: ${JSON.stringify(json.errors)}`);
              }
              return json.data;
            };

            async function findCategory(slug) {
              const found = await wpGraphQL(
                `query($slug: [String]) { categories(where: { slug: $slug }) { nodes { id } } }`,
                { slug: [slug] }
              );
              return found.categories?.nodes?.[0]?.id || null;
            }

            const current = process.env.CURRENT_VERSION;
            const previous = process.env.PREVIOUS_VERSION;

            try {
              const categoryId = await findCategory('release-notes');
              if (!categoryId) core.warning('Category "release-notes" not found — publishing without category.');
              const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
              const content = [
                `<p>WordPress has been updated from <code>${previous}</code> to <code>${current}</code> via upstream sync.</p>`,
                `<p>The autopilot branch has been automatically updated with the latest changes from trunk.</p>`,
                `<p><a href="${repoUrl}/compare/${previous}...${current}">View changes on GitHub</a></p>`,
              ].join('\n');

              const data = await wpGraphQL(
                `mutation CreatePost($title: String!, $content: String!, $status: PostStatusEnum!, $categories: PostCategoriesInput) {
                  createPost(input: { title: $title, content: $content, status: $status, categories: $categories }) {
                    post { id uri link }
                  }
                }`,
                {
                  title: `WordPress ${current} synced to autopilot`,
                  content,
                  status: 'PUBLISH',
                  ...(categoryId && { categories: { append: true, nodes: [{ id: categoryId }] } }),
                }
              );
              core.info(`Published release notes: ${data.createPost.post.link}`);
            } catch (err) {
              core.setFailed(`Flight Log publish failed: ${err.message}`);
            }

      - name: Create conflict resolution issue
        if: steps.merge.outputs.result == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'type:conflict',
              per_page: 5,
            });

            if (existing.length > 0) {
              core.info('Conflict issue already open.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Resolve upstream merge conflict on autopilot',
              body: [
                'The daily sync from `trunk` (upstream WordPress) cannot fast-forward into `autopilot`.',
                '',
                'Agent work on `autopilot` has diverged from upstream.',
                '',
                '## Task',
                '',
                '1. Merge `trunk` into `autopilot` resolving any conflicts',
                '2. Prefer upstream changes unless agent work is clearly intentional',
                '3. Ensure all tests pass after resolution',
                '4. Open a PR targeting `autopilot` with the merge',
              ].join('\n'),
              labels: ['agent', 'type:conflict', 'status:triage'],
            });
