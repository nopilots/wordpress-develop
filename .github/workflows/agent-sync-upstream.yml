name: Upstream Sync

on:
  schedule:
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  models: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Kill switch
        uses: actions/github-script@v7
        with:
          script: |
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'system:off',
              per_page: 1,
            });
            if (killSwitch.length > 0) {
              core.info('System is off.');
              process.exit(0);
            }

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PAT_APP_ID }}
          private-key: ${{ secrets.PAT_PRIVATE_KEY }}

      - name: Sync trunk with upstream
        run: gh repo sync ${{ github.repository }} -b trunk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout autopilot
        uses: actions/checkout@v4
        with:
          ref: autopilot
          fetch-depth: 0
          token: ${{ secrets.COPILOT_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge trunk into autopilot
        id: merge
        run: |
          git fetch origin trunk
          if git merge origin/trunk --no-edit; then
            git push origin autopilot
            echo "result=success" >> $GITHUB_OUTPUT
          else
            git merge --abort
            echo "result=conflict" >> $GITHUB_OUTPUT
          fi

      - name: Analyze upstream changes for agent impact
        if: steps.merge.outputs.result == 'success'
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const { execSync } = require('child_process');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Auto-close conflict human issue on successful merge
            const { data: humanIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'needs:human', per_page: 50,
            });
            const conflictHuman = humanIssues.find(i => i.title === '[Human] Merge conflict persists — upstream sync blocked');
            if (conflictHuman) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: conflictHuman.number,
                body: 'Upstream sync succeeded. Conflict resolved. Auto-closing.',
              });
              await github.rest.issues.update({
                owner, repo, issue_number: conflictHuman.number,
                state: 'closed', state_reason: 'completed',
              });
            }

            // Get files changed in the merge
            let changedFiles;
            try {
              changedFiles = execSync('git diff --name-only HEAD~1 HEAD', { encoding: 'utf8' })
                .trim().split('\n').filter(Boolean);
            } catch (e) {
              core.info('No diff available.');
              return;
            }

            if (changedFiles.length === 0) {
              core.info('No upstream changes.');
              return;
            }

            // Get files that agents have previously modified (from merged PRs)
            const { data: mergedPRs } = await github.rest.pulls.list({
              owner, repo, state: 'closed', base: 'autopilot', per_page: 20,
            });
            const agentFiles = new Set();
            for (const pr of mergedPRs.filter(p => p.merged_at)) {
              try {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner, repo, pull_number: pr.number, per_page: 50,
                });
                files.forEach(f => agentFiles.add(f.filename));
              } catch (e) { /* skip */ }
            }

            // Find overlap — upstream changed files that agents have also touched
            const overlap = changedFiles.filter(f => agentFiles.has(f));

            if (overlap.length === 0) {
              core.info(`Upstream changed ${changedFiles.length} files, no overlap with agent work.`);
              return;
            }

            core.info(`Found ${overlap.length} upstream changes overlapping agent work.`);

            // Check for existing issue
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'agent', per_page: 50,
            });

            const title = `Evaluate upstream changes in ${overlap.length} file${overlap.length !== 1 ? 's' : ''}`;
            if (existing.some(i => i.title.toLowerCase().startsWith('evaluate upstream'))) {
              core.info('Upstream evaluation issue already open.');
              return;
            }

            await github.rest.issues.create({
              owner, repo,
              title,
              body: [
                `The latest upstream sync changed files that agents have previously modified.`,
                '',
                `**Overlapping files:**`,
                ...overlap.slice(0, 10).map(f => `- \`${f}\``),
                overlap.length > 10 ? `- ...and ${overlap.length - 10} more` : '',
                '',
                `## Task`,
                '',
                `1. Review the upstream changes in these files`,
                `2. Check if any agent work on autopilot conflicts with the upstream changes`,
                `3. If conflicts exist, propose a resolution`,
                `4. If no conflicts, close this issue`,
              ].filter(Boolean).join('\n'),
              labels: ['agent', 'status:ready'],
            });

            core.info('Created upstream evaluation issue.');

      - name: Detect version bump
        id: version-check
        if: steps.merge.outputs.result == 'success'
        run: |
          CURRENT_VERSION=$(grep -oP "\\\$wp_version = '\K[^']+" src/wp-includes/version.php || echo "unknown")
          PREVIOUS_VERSION=$(git show HEAD~1:src/wp-includes/version.php 2>/dev/null | grep -oP "\\\$wp_version = '\K[^']+" || echo "unknown")
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "previous=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ] && [ "$CURRENT_VERSION" != "unknown" ] && [ "$PREVIOUS_VERSION" != "unknown" ]; then
            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi

      - name: Build release notes content
        if: steps.version-check.outputs.bumped == 'true'
        uses: actions/github-script@v7
        env:
          CURRENT_VERSION: ${{ steps.version-check.outputs.current }}
          PREVIOUS_VERSION: ${{ steps.version-check.outputs.previous }}
        with:
          script: |
            const current = process.env.CURRENT_VERSION;
            const previous = process.env.PREVIOUS_VERSION;
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            const content = [
              `<p>WordPress has been updated from <code>${previous}</code> to <code>${current}</code> via upstream sync.</p>`,
              `<p>The autopilot branch has been automatically updated with the latest changes from trunk.</p>`,
              `<p><a href="${repoUrl}/compare/${previous}...${current}">View changes on GitHub</a></p>`,
            ].join('\n');

            core.exportVariable('FLIGHT_LOG_TITLE', `WordPress ${current}`);
            core.exportVariable('FLIGHT_LOG_CONTENT', content);
            core.exportVariable('FLIGHT_LOG_EXCERPT', `WordPress updated from ${previous} to ${current}.`);

      - name: Checkout for composite action
        if: steps.version-check.outputs.bumped == 'true'
        uses: actions/checkout@v4

      - name: Publish to Flight Log
        if: steps.version-check.outputs.bumped == 'true' && env.FLIGHT_LOG_TITLE != ''
        uses: ./.github/actions/publish-to-flight-log
        with:
          title: ${{ env.FLIGHT_LOG_TITLE }}
          content: ${{ env.FLIGHT_LOG_CONTENT }}
          excerpt: ${{ env.FLIGHT_LOG_EXCERPT }}
          category-slug: changelog
          author-slug: autopilot
          refine-prompt: 'Review and refine this Changelog post about a WordPress version sync. Keep it brief. No AI slop — no excitement, no announcements, no filler.'
          wp-url: ${{ secrets.WP_URL }}
          wp-auth: ${{ secrets.WP_AUTH }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create conflict resolution issue
        if: steps.merge.outputs.result == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'type:conflict',
              per_page: 5,
            });

            if (existing.length > 0) {
              // Conflict issue already exists — check if stale (>48h), escalate to needs:human
              const oldest = existing[0];
              if (Date.now() - new Date(oldest.created_at) > 48 * 60 * 60 * 1000) {
                const humanTitle = '[Human] Merge conflict persists — upstream sync blocked';
                const { data: humanIssues } = await github.rest.issues.listForRepo({
                  owner: context.repo.owner, repo: context.repo.repo,
                  state: 'open', labels: 'needs:human', per_page: 50,
                });
                if (!humanIssues.some(i => i.title === humanTitle)) {
                  await github.rest.issues.create({
                    owner: context.repo.owner, repo: context.repo.repo,
                    title: humanTitle,
                    body: [
                      '## What is stuck',
                      `A merge conflict between \`trunk\` and \`autopilot\` has persisted for >48h.`,
                      '',
                      `**Conflict issue:** #${oldest.number}`,
                      '',
                      '## What the system tried',
                      'Created a conflict resolution issue and assigned it to an agent. The agent has not resolved it.',
                      '',
                      '## What a human should do',
                      '1. Checkout `autopilot` and run `git merge origin/trunk`',
                      '2. Resolve conflicts manually',
                      '3. Push the resolution and close the conflict issue',
                    ].join('\n'),
                    labels: ['needs:human', 'agent'],
                  });
                }
              }
              core.info('Conflict issue already open.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Resolve upstream merge conflict on autopilot',
              body: [
                'The daily sync from `trunk` (upstream WordPress) cannot fast-forward into `autopilot`.',
                '',
                'Agent work on `autopilot` has diverged from upstream.',
                '',
                '## Task',
                '',
                '1. Merge `trunk` into `autopilot` resolving any conflicts',
                '2. Prefer upstream changes unless agent work is clearly intentional',
                '3. Ensure all tests pass after resolution',
                '4. Open a PR targeting `autopilot` with the merge',
              ].join('\n'),
              labels: ['agent', 'type:conflict', 'status:triage'],
            });
