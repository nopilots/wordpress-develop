name: Sync Upstream Trunk

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync trunk with upstream
        run: gh repo sync ${{ github.repository }} -b trunk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge trunk into autopilot
        uses: actions/checkout@v4
        with:
          ref: autopilot
          fetch-depth: 0

      - name: Fast-forward autopilot from trunk
        run: |
          git fetch origin trunk
          git merge origin/trunk --ff-only || echo "::warning::Cannot fast-forward autopilot from trunk. Manual merge may be needed."
          git push origin autopilot
