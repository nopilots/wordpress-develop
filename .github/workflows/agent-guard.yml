name: Agent Guard

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write
  issues: read

jobs:
  check-target:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.base.ref == 'trunk' &&
      (startsWith(github.event.pull_request.head.ref, 'agent/') ||
       startsWith(github.event.pull_request.head.ref, 'copilot/') ||
       startsWith(github.event.pull_request.head.ref, 'claude/') ||
       startsWith(github.event.pull_request.head.ref, 'codex/'))
    steps:
      - name: Close PR targeting trunk
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: pr.number,
              body: 'Agent PRs must target the `autopilot` branch, not `trunk`. Trunk is a read-only mirror of upstream WordPress. Please reopen this PR targeting `autopilot`.',
            });

            await github.rest.pulls.update({
              owner, repo,
              pull_number: pr.number,
              state: 'closed',
            });

            core.info(`Closed PR #${pr.number} — targeted trunk instead of autopilot.`);
