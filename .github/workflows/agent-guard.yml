name: Agent Guard

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  check-target:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.base.ref == 'trunk' &&
      (startsWith(github.event.pull_request.head.ref, 'agent/') ||
       startsWith(github.event.pull_request.head.ref, 'copilot/'))
    steps:
      - name: Close PR targeting trunk
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: 'Agent PRs must target the `autopilot` branch, not `trunk`. Trunk is a read-only mirror of upstream WordPress. Please reopen this PR targeting `autopilot`.',
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: 'closed',
            });

            core.info(`Closed PR #${pr.number} — targeted trunk instead of autopilot.`);
