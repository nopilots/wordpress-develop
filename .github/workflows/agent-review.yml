name: Preflight Review

on:
  pull_request_target:
    types: [opened, ready_for_review]
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true

permissions:
  contents: read
  issues: write
  models: read

concurrency:
  group: agent-review-${{ github.event.pull_request.number || github.event.check_suite.pull_requests[0].number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.draft == false &&
       github.event.pull_request.base.ref == 'autopilot') ||
      (github.event_name == 'check_suite' &&
       github.event.check_suite.pull_requests[0] != null)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Doc token
        id: doc-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DOC_APP_ID }}
          private-key: ${{ secrets.DOC_PRIVATE_KEY }}

      - name: Dalton token
        id: dalton-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DALTON_APP_ID }}
          private-key: ${{ secrets.DALTON_PRIVATE_KEY }}

      - name: Pat token
        id: pat-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PAT_APP_ID }}
          private-key: ${{ secrets.PAT_PRIVATE_KEY }}

      - name: Remove human assignees from PR
        uses: actions/github-script@v7
        env:
          PAT_TOKEN: ${{ steps.pat-token.outputs.token }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request?.number
              || context.payload.check_suite?.pull_requests?.[0]?.number
              || parseInt(context.payload.inputs?.pr_number);
            if (!prNumber) return;

            const { data: pr } = await github.rest.issues.get({
              owner, repo, issue_number: prNumber,
            });

            // Remove any non-bot assignees (human users added by coding agent PAT)
            const humans = pr.assignees
              .filter(a => a.type === 'User')
              .map(a => a.login);

            if (humans.length > 0) {
              await fetch(`https://api.github.com/repos/${owner}/${repo}/issues/${prNumber}/assignees`, {
                method: 'DELETE',
                headers: {
                  'Authorization': `Bearer ${process.env.PAT_TOKEN}`,
                  'Content-Type': 'application/json',
                  'Accept': 'application/vnd.github+json',
                },
                body: JSON.stringify({ assignees: humans }),
              });
              core.info(`Removed human assignees from PR #${prNumber}: ${humans.join(', ')}`);
            }

      - name: Read corrections from Flight Log
        id: read-corrections
        uses: ./.github/actions/read-from-flight-log
        with:
          category-slug: corrections
          count: '5'
          wp-url: ${{ secrets.WP_URL }}
          wp-auth: ${{ secrets.WP_AUTH }}

      - name: Run persona reviews
        uses: actions/github-script@v7
        env:
          DOC_TOKEN: ${{ steps.doc-token.outputs.token }}
          DALTON_TOKEN: ${{ steps.dalton-token.outputs.token }}
          PAT_TOKEN: ${{ steps.pat-token.outputs.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CORRECTIONS_CONTEXT: ${{ steps.read-corrections.outputs.summary }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request?.number
              || context.payload.check_suite?.pull_requests?.[0]?.number
              || parseInt(context.payload.inputs?.pr_number);

            if (!prNumber) {
              core.info('No PR number.');
              return;
            }

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            // Check what reviews already exist
            const { data: existingComments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber, per_page: 100,
            });
            const { data: existingReviews } = await github.rest.pulls.listReviews({
              owner, repo, pull_number: prNumber,
            });
            const docDone = existingComments.some(c => c.body?.includes('**Doc** (Code Quality)'));
            const daltonDone = existingComments.some(c => c.body?.includes('**Dalton** (Security)'));
            const patDone = existingReviews.some(r => r.user?.login === 'nopilots-pat[bot]');

            if (docDone && daltonDone && patDone) {
              core.info('All personas already reviewed this PR.');
              return;
            }

            // Get PR details
            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber,
            });

            // Test gate: don't spend Models API budget on PRs whose tests are red or pending.
            // Green PRs proceed. Failed PRs get a one-time "waiting for test fixes" comment and skip.
            // Pending PRs skip quietly — the check_suite:completed trigger will re-fire this workflow
            // when tests finish, and the existing docDone/daltonDone/patDone idempotency handles
            // any re-entry cleanly.
            //
            // Crew-internal check runs are excluded from the gate decision so the review doesn't
            // block on its own output or on safety/guard workflows that always run.
            const CREW_CHECK_NAME_PATTERNS = [
              /^review$/i,
              /preflight.review/i,
              /^safety$/i,
              /branch.guard/i,
              /file.guard/i,
              /agent[-\s]/i,
            ];
            const isCrewCheck = (name) =>
              CREW_CHECK_NAME_PATTERNS.some((p) => p.test(name || ''));

            try {
              const { data: checksData } = await github.rest.checks.listForRef({
                owner, repo, ref: pr.head.sha, per_page: 100,
              });
              const externalRuns = (checksData.check_runs || []).filter(
                (c) => !isCrewCheck(c.name)
              );
              const failed = externalRuns.filter(
                (c) => c.status === 'completed' &&
                  ['failure', 'timed_out', 'cancelled', 'action_required'].includes(c.conclusion)
              );
              const pending = externalRuns.filter(
                (c) => c.status !== 'completed'
              );

              if (failed.length > 0) {
                core.info(`Test gate: ${failed.length} failed external check(s) — skipping LLM review.`);
                // Post a one-time "waiting for tests" comment so humans understand why the crew isn't reviewing
                const gateMarker = '<!-- preflight-test-gate -->';
                const alreadyPosted = existingComments.some(
                  (c) => c.body?.includes(gateMarker)
                );
                if (!alreadyPosted) {
                  const failedNames = failed.map((c) => c.name).join(', ');
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: prNumber,
                    body: [
                      gateMarker,
                      '**Preflight Review deferred — failing checks.**',
                      '',
                      `The following checks are failing on ${pr.head.sha.substring(0, 7)}:`,
                      '',
                      ...failed.map((c) => `- \`${c.name}\` → ${c.conclusion}`),
                      '',
                      'The crew will not spend review budget on code that is not passing its own test suite. Fix the failures, push, and the review will re-fire automatically when the check suite completes.',
                    ].join('\n'),
                  });
                  core.info(`Posted test gate comment listing: ${failedNames}`);
                }
                return;
              }

              if (pending.length > 0) {
                core.info(`Test gate: ${pending.length} check(s) still running — deferring review. Will re-fire on check_suite completion.`);
                return;
              }

              if (externalRuns.length === 0) {
                core.info('Test gate: no external check runs found — proceeding (nothing to gate on).');
              } else {
                core.info(`Test gate: all ${externalRuns.length} external check(s) green — proceeding with review.`);
              }
            } catch (gateErr) {
              core.warning(`Test gate lookup failed, proceeding defensively: ${gateErr.message}`);
            }

            // Get PR diff as text
            const diffResponse = await fetch(pr.diff_url, {
              headers: { 'Authorization': `Bearer ${process.env.GITHUB_TOKEN}` },
            });
            const diff = diffResponse.ok ? await diffResponse.text() : '';

            if (!diff) {
              core.warning('Could not fetch PR diff.');
              return;
            }

            // Truncate diff to fit token limits
            const maxDiff = 12000;
            const wasTruncated = diff.length > maxDiff;
            const truncatedDiff = wasTruncated
              ? diff.substring(0, maxDiff) + `\n... (diff truncated — ${diff.length - maxDiff} chars unreviewed)`
              : diff;

            const correctionsContext = process.env.CORRECTIONS_CONTEXT || '';
            const prContext = [
              `# PR #${prNumber}: ${pr.title}`,
              '',
              pr.body || 'No description.',
              '',
              '## Diff',
              '```diff',
              truncatedDiff,
              '```',
              correctionsContext ? `\n## Recent course corrections (abandoned PRs)\n${correctionsContext}` : '',
            ].filter(Boolean).join('\n');

            // Helper: call GitHub Models API with model rotation and fallback.
            // Tracks the last successfully used model in `lastModelUsed` so the
            // final Flight Log publish step can attribute Pat's generation correctly.
            const MODELS = ['openai/gpt-4o-mini', 'anthropic/claude-haiku'];
            let lastModelUsed = '';
            async function askModel(systemPrompt, userPrompt) {
              const primary = MODELS[new Date().getHours() % MODELS.length];
              const fallbacks = MODELS.filter(m => m !== primary);

              for (const model of [primary, ...fallbacks]) {
                try {
                  const res = await fetch('https://models.github.ai/inference/chat/completions', {
                    method: 'POST',
                    headers: {
                      'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                      'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                      model,
                      messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userPrompt },
                      ],
                      max_tokens: 400,
                      temperature: 0.5,
                    }),
                  });

                  if (res.ok) {
                    const result = await res.json();
                    const content = result.choices?.[0]?.message?.content;
                    if (content) {
                      core.info(`Model: ${model}`);
                      lastModelUsed = model;
                      return content;
                    }
                  }
                  core.warning(`${model} failed, trying fallback...`);
                } catch (e) {
                  core.warning(`${model} error: ${e.message}`);
                }
              }

              core.warning('All models failed.');
              return null;
            }

            // Helper: post comment as an app
            async function postAsApp(token, body) {
              const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/issues/${prNumber}/comments`, {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'Accept': 'application/vnd.github.v3+json',
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ body }),
              });

              if (!res.ok) {
                const err = await res.text();
                core.warning(`Failed to post comment: ${err}`);
              }
            }

            // Helper: submit formal review as an app
            async function reviewAsApp(token, body, event) {
              const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/pulls/${prNumber}/reviews`, {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'Accept': 'application/vnd.github.v3+json',
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ body, event }),
              });

              if (!res.ok) {
                const err = await res.text();
                core.warning(`Failed to submit review: ${err}`);
              }
            }

            // 1 & 2. Doc and Dalton review in parallel (independent of each other)
            async function runDocReview() {
              if (docDone) {
                core.info('Doc already reviewed.');
                return existingComments.find(c => c.body?.includes('**Doc**'))?.body || null;
              }
              const docPrompt = fs.readFileSync('.github/agent-personas/doc.md', 'utf8');
              const review = await askModel(docPrompt, `Review this pull request for code quality.\n\n${prContext}`);
              if (review && !review.includes('READABILITY:')) {
                core.warning('Doc review missing rubric checklist.');
              }
              if (review) {
                await postAsApp(process.env.DOC_TOKEN, review);
                core.info('Doc reviewed.');
              } else {
                core.warning('Doc review failed — Models API unavailable.');
              }
              return review;
            }

            async function runDaltonReview() {
              if (daltonDone) {
                core.info('Dalton already reviewed.');
                return existingComments.find(c => c.body?.includes('**Dalton**'))?.body || null;
              }
              const daltonPrompt = fs.readFileSync('.github/agent-personas/dalton.md', 'utf8');
              const review = await askModel(daltonPrompt, `Review this pull request for security concerns.\n\n${prContext}`);
              if (review && !review.includes('INPUT_SANITIZATION:')) {
                core.warning('Dalton review missing rubric checklist.');
              }
              if (review) {
                await postAsApp(process.env.DALTON_TOKEN, review);
                core.info('Dalton reviewed.');
              } else {
                core.warning('Dalton review failed — Models API unavailable.');
              }
              return review;
            }

            const [docReview, daltonReview] = await Promise.all([
              runDocReview().catch(e => { core.warning(`Doc review threw: ${e.message}`); return null; }),
              runDaltonReview().catch(e => { core.warning(`Dalton review threw: ${e.message}`); return null; }),
            ]);

            // 3. Pat reads summaries and makes the decision
            if (patDone) {
              core.info('Pat already reviewed.');
              return;
            }
            const patPrompt = fs.readFileSync('.github/agent-personas/pat.md', 'utf8')
              + '\n\nEnd your response with exactly one of these lines:\nDECISION: APPROVE\nDECISION: REQUEST_CHANGES';

            const docSummary = docReview ? docReview.substring(0, 800) : '_Review unavailable._';
            const daltonSummary = daltonReview ? daltonReview.substring(0, 800) : '_Review unavailable._';

            const patContext = [
              `# PR #${prNumber}: ${pr.title}`,
              '',
              pr.body || 'No description.',
              '',
              wasTruncated ? `**Warning:** The diff was truncated. ${diff.length - maxDiff} characters were not reviewed by Doc or Dalton.\n` : '',
              '## Doc (Code Quality)',
              docSummary,
              '',
              '## Dalton (Security)',
              daltonSummary,
            ].filter(Boolean).join('\n');

            const patReview = await askModel(patPrompt, `Read the reviews from Doc and Dalton. Make your final decision on this PR.\n\n${patContext}`);

            if (patReview) {
              const event = patReview.includes('DECISION: APPROVE') ? 'APPROVE' : 'REQUEST_CHANGES';
              await reviewAsApp(process.env.PAT_TOKEN, patReview, event);
              core.info(`Pat: ${event}`);

              // Build Flight Log content for composite action
              // Extract first meaningful line from PR body as summary
              const firstLine = (pr.body || '')
                .split('\n')
                .map(l => l.trim())
                .find(l => l.length > 10 && !l.startsWith('#') && !l.startsWith('- [')) || '';

              // Extract Pat's rationale (strip the DECISION line)
              const patRationale = (patReview || '')
                .replace(/DECISION:\s*(APPROVE|REQUEST_CHANGES)/g, '')
                .replace(/```[\s\S]*?```/g, '')
                .replace(/\*\*/g, '')
                .trim()
                .substring(0, 500);

              const reviewContent = [
                `<p><a href="${pr.html_url}">View PR #${prNumber} on GitHub →</a></p>`,
                firstLine ? `<p>${firstLine}</p>` : '',
                `<h2>Verdict: ${event === 'APPROVE' ? 'Approved' : 'Changes Requested'}</h2>`,
                `<p>${patRationale}</p>`,
              ].filter(Boolean).join('\n');

              core.exportVariable('FLIGHT_LOG_TITLE', pr.title);
              core.exportVariable('FLIGHT_LOG_CONTENT', reviewContent);
              core.exportVariable('FLIGHT_LOG_EXCERPT', `Verdict: ${event === 'APPROVE' ? 'Approved' : 'Changes requested'}.`);
              // lastModelUsed reflects Pat's generation (Pat was the last askModel call)
              core.exportVariable('GENERATOR_MODEL', lastModelUsed);
              // Auto-close Models API human issue on success
              const { data: humanIssues } = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', labels: 'needs:human', per_page: 50,
              });
              const modelsReviewIssue = humanIssues.find(i => i.title === '[Human] Models API unavailable — PR reviews blocked');
              if (modelsReviewIssue) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: modelsReviewIssue.number,
                  body: 'Models API is responding. Review completed. Auto-closing.',
                });
                await github.rest.issues.update({
                  owner, repo, issue_number: modelsReviewIssue.number,
                  state: 'closed', state_reason: 'completed',
                });
              }
            } else {
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: prNumber,
                labels: ['safety:halt'],
              });
              core.setFailed('Pat review failed — Models API unavailable. PR halted.');

              // Check if multiple PRs halted due to review failure — signal for human
              // Only count PRs with no Pat review (halted by this workflow, not by Safety for other reasons)
              const { data: haltedPRs } = await github.rest.pulls.list({
                owner, repo, state: 'open', per_page: 20,
              });
              const haltedForReview = [];
              for (const p of haltedPRs.filter(p => p.labels.some(l => l.name === 'safety:halt'))) {
                const { data: reviews } = await github.rest.pulls.listReviews({
                  owner, repo, pull_number: p.number,
                });
                if (!reviews.some(r => r.user?.login === 'nopilots-pat[bot]')) {
                  haltedForReview.push(p);
                }
              }
              const modelsHalted = haltedForReview;
              if (modelsHalted.length >= 2) {
                const humanTitle = '[Human] Models API unavailable — PR reviews blocked';
                const { data: humanIssues } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'open', labels: 'needs:human', per_page: 50,
                });
                if (!humanIssues.some(i => i.title === humanTitle)) {
                  await github.rest.issues.create({
                    owner, repo,
                    title: humanTitle,
                    body: [
                      '## What is stuck',
                      `The Models API is down. ${modelsHalted.length} PRs are halted because review cannot function without AI.`,
                      '',
                      `**Halted PRs:** ${modelsHalted.map(p => `#${p.number}`).join(', ')}`,
                      '',
                      '## What the system tried',
                      'The review workflow attempted multiple model providers with fallback. All failed.',
                      '',
                      '## What a human should do',
                      '1. Check GitHub Models API status',
                      '2. If persistent, manually review the halted PRs',
                      '3. Remove `safety:halt` labels from PRs once reviewed',
                    ].join('\n'),
                    labels: ['needs:human', 'agent'],
                  });
                }
              }
            }

      - name: Publish to Flight Log
        if: env.FLIGHT_LOG_TITLE != ''
        uses: ./.github/actions/publish-to-flight-log
        with:
          title: ${{ env.FLIGHT_LOG_TITLE }}
          content: ${{ env.FLIGHT_LOG_CONTENT }}
          excerpt: ${{ env.FLIGHT_LOG_EXCERPT }}
          category-slug: preflight
          author-slug: pat
          refine-prompt: 'Review and refine this Preflight Review. It should show: a link to the PR, a brief summary, and the verdict. Strip verbose review text. No AI slop — no excitement, no announcements, no filler.'
          generator-model: ${{ env.GENERATOR_MODEL }}
          wp-url: ${{ secrets.WP_URL }}
          wp-auth: ${{ secrets.WP_AUTH }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
