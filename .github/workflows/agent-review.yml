name: Agent Review

on:
  pull_request_target:
    types: [opened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true

permissions:
  contents: read
  models: read

concurrency:
  group: agent-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.draft == false &&
       github.event.pull_request.base.ref == 'autopilot')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Doc token
        id: doc-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DOC_APP_ID }}
          private-key: ${{ secrets.DOC_PRIVATE_KEY }}

      - name: Dalton token
        id: dalton-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DALTON_APP_ID }}
          private-key: ${{ secrets.DALTON_PRIVATE_KEY }}

      - name: Pat token
        id: pat-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PAT_APP_ID }}
          private-key: ${{ secrets.PAT_PRIVATE_KEY }}

      - name: Remove human assignees from PR
        uses: actions/github-script@v7
        env:
          PAT_TOKEN: ${{ steps.pat-token.outputs.token }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request?.number
              || parseInt(context.payload.inputs?.pr_number);
            if (!prNumber) return;

            const { data: pr } = await github.rest.issues.get({
              owner, repo, issue_number: prNumber,
            });

            // Remove any non-bot assignees (human users added by coding agent PAT)
            const humans = pr.assignees
              .filter(a => a.type === 'User')
              .map(a => a.login);

            if (humans.length > 0) {
              await fetch(`https://api.github.com/repos/${owner}/${repo}/issues/${prNumber}/assignees`, {
                method: 'DELETE',
                headers: {
                  'Authorization': `Bearer ${process.env.PAT_TOKEN}`,
                  'Content-Type': 'application/json',
                  'Accept': 'application/vnd.github+json',
                },
                body: JSON.stringify({ assignees: humans }),
              });
              core.info(`Removed human assignees from PR #${prNumber}: ${humans.join(', ')}`);
            }

      - name: Run persona reviews
        uses: actions/github-script@v7
        env:
          DOC_TOKEN: ${{ steps.doc-token.outputs.token }}
          DALTON_TOKEN: ${{ steps.dalton-token.outputs.token }}
          PAT_TOKEN: ${{ steps.pat-token.outputs.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request?.number
              || parseInt(context.payload.inputs?.pr_number);

            if (!prNumber) {
              core.info('No PR number.');
              return;
            }

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            // Check what reviews already exist
            const { data: existingComments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber, per_page: 100,
            });
            const { data: existingReviews } = await github.rest.pulls.listReviews({
              owner, repo, pull_number: prNumber,
            });
            const docDone = existingComments.some(c => c.body?.includes('**Doc** (Code Quality)'));
            const daltonDone = existingComments.some(c => c.body?.includes('**Dalton** (Security)'));
            const patDone = existingReviews.some(r => r.user?.login === 'nopilots-pat[bot]');

            if (docDone && daltonDone && patDone) {
              core.info('All personas already reviewed this PR.');
              return;
            }

            // Get PR details
            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber,
            });

            // Get PR diff as text
            const diffResponse = await fetch(pr.diff_url, {
              headers: { 'Authorization': `Bearer ${process.env.GITHUB_TOKEN}` },
            });
            const diff = diffResponse.ok ? await diffResponse.text() : '';

            if (!diff) {
              core.warning('Could not fetch PR diff.');
              return;
            }

            // Truncate diff to fit free tier token limits (~8K tokens = ~4K chars for diff after prompt overhead)
            const maxDiff = 4000;
            const truncatedDiff = diff.length > maxDiff
              ? diff.substring(0, maxDiff) + '\n... (diff truncated)'
              : diff;

            const prContext = [
              `# PR #${prNumber}: ${pr.title}`,
              '',
              pr.body || 'No description.',
              '',
              '## Diff',
              '```diff',
              truncatedDiff,
              '```',
            ].join('\n');

            // Helper: call GitHub Models API
            async function askModel(systemPrompt, userPrompt) {
              const res = await fetch('https://models.github.ai/inference/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'openai/gpt-4o-mini',
                  messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: userPrompt },
                  ],
                  max_tokens: 400,
                  temperature: 0.5,
                }),
              });

              if (!res.ok) {
                const err = await res.text();
                core.warning(`Models API error: ${err}`);
                return null;
              }

              const result = await res.json();
              return result.choices?.[0]?.message?.content || null;
            }

            // Helper: post comment as an app
            async function postAsApp(token, body) {
              const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/issues/${prNumber}/comments`, {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'Accept': 'application/vnd.github.v3+json',
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ body }),
              });

              if (!res.ok) {
                const err = await res.text();
                core.warning(`Failed to post comment: ${err}`);
              }
            }

            // Helper: submit formal review as an app
            async function reviewAsApp(token, body, event) {
              const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/pulls/${prNumber}/reviews`, {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'Accept': 'application/vnd.github.v3+json',
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ body, event }),
              });

              if (!res.ok) {
                const err = await res.text();
                core.warning(`Failed to submit review: ${err}`);
              }
            }

            // 1. Doc reviews code quality
            let docReview = null;
            if (!docDone) {
              const docPrompt = fs.readFileSync('.github/agent-personas/doc.md', 'utf8');
              docReview = await askModel(docPrompt, `Review this pull request for code quality.\n\n${prContext}`);
              if (docReview) {
                await postAsApp(process.env.DOC_TOKEN, docReview);
                core.info('Doc reviewed.');
              } else {
                core.warning('Doc review failed — Models API unavailable.');
              }
            } else {
              docReview = existingComments.find(c => c.body?.includes('**Doc**'))?.body || null;
              core.info('Doc already reviewed.');
            }

            // 2. Dalton reviews security
            let daltonReview = null;
            if (!daltonDone) {
              const daltonPrompt = fs.readFileSync('.github/agent-personas/dalton.md', 'utf8');
              daltonReview = await askModel(daltonPrompt, `Review this pull request for security concerns.\n\n${prContext}`);
              if (daltonReview) {
                await postAsApp(process.env.DALTON_TOKEN, daltonReview);
                core.info('Dalton reviewed.');
              } else {
                core.warning('Dalton review failed — Models API unavailable.');
              }
            } else {
              daltonReview = existingComments.find(c => c.body?.includes('**Dalton**'))?.body || null;
              core.info('Dalton already reviewed.');
            }

            // 3. Pat reads summaries and makes the decision
            if (patDone) {
              core.info('Pat already reviewed.');
              return;
            }
            const patPrompt = fs.readFileSync('.github/agent-personas/pat.md', 'utf8')
              + '\n\nEnd your response with exactly one of these lines:\nDECISION: APPROVE\nDECISION: REQUEST_CHANGES';

            const docSummary = docReview ? docReview.substring(0, 800) : '_Review unavailable._';
            const daltonSummary = daltonReview ? daltonReview.substring(0, 800) : '_Review unavailable._';

            const patContext = [
              `# PR #${prNumber}: ${pr.title}`,
              '',
              pr.body || 'No description.',
              '',
              '## Doc (Code Quality)',
              docSummary,
              '',
              '## Dalton (Security)',
              daltonSummary,
            ].join('\n');

            const patReview = await askModel(patPrompt, `Read the reviews from Doc and Dalton. Make your final decision on this PR.\n\n${patContext}`);

            if (patReview) {
              const event = patReview.includes('DECISION: APPROVE') ? 'APPROVE' : 'REQUEST_CHANGES';
              await reviewAsApp(process.env.PAT_TOKEN, patReview, event);
              core.info(`Pat: ${event}`);

              // Build Flight Log content for composite action
              // Extract first meaningful line from PR body as summary
              const firstLine = (pr.body || '')
                .split('\n')
                .map(l => l.trim())
                .find(l => l.length > 10 && !l.startsWith('#') && !l.startsWith('- [')) || '';

              // Extract Pat's rationale (strip the DECISION line)
              const patRationale = (patReview || '')
                .replace(/DECISION:\s*(APPROVE|REQUEST_CHANGES)/g, '')
                .replace(/```[\s\S]*?```/g, '')
                .replace(/\*\*/g, '')
                .trim()
                .substring(0, 500);

              const reviewContent = [
                `<p><a href="${pr.html_url}">View PR #${prNumber} on GitHub →</a></p>`,
                firstLine ? `<p>${firstLine}</p>` : '',
                `<h2>Verdict: ${event === 'APPROVE' ? 'Approved' : 'Changes Requested'}</h2>`,
                `<p>${patRationale}</p>`,
              ].filter(Boolean).join('\n');

              core.exportVariable('FLIGHT_LOG_TITLE', pr.title);
              core.exportVariable('FLIGHT_LOG_CONTENT', reviewContent);
              core.exportVariable('FLIGHT_LOG_EXCERPT', `Verdict: ${event === 'APPROVE' ? 'Approved' : 'Changes requested'}.`);
            } else {
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: prNumber,
                labels: ['safety:halt'],
              });
              core.setFailed('Pat review failed — Models API unavailable. PR halted.');
            }

      - name: Publish to Flight Log
        if: env.FLIGHT_LOG_TITLE != ''
        uses: ./.github/actions/publish-to-flight-log
        with:
          title: ${{ env.FLIGHT_LOG_TITLE }}
          content: ${{ env.FLIGHT_LOG_CONTENT }}
          excerpt: ${{ env.FLIGHT_LOG_EXCERPT }}
          category-slug: preflight
          author-slug: pat
          refine-prompt: 'Review and refine this Preflight Review. It should show: a link to the PR, a brief summary, and the verdict. Strip verbose review text.'
          wp-url: ${{ secrets.WP_URL }}
          wp-auth: ${{ secrets.WP_AUTH }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
