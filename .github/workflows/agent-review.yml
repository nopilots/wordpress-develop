name: Agent Review

on:
  pull_request_target:
    types: [opened, ready_for_review]
  pull_request_review:
    types: [submitted]

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  request-review:
    runs-on: ubuntu-latest
    concurrency:
      group: agent-review-create-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    if: >
      github.event_name == 'pull_request_target' &&
      (github.event.pull_request.draft == false || github.event.action == 'ready_for_review') &&
      github.event.pull_request.base.ref == 'autopilot'
    steps:
      - name: Create review issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) return;

            // Prevent loops
            if (pr.labels?.some(l => l.name === 'type:review-task')) {
              core.info('PR is from a review task. Skipping.');
              return;
            }

            // Check if review issue already exists (open or closed)
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'all',
              labels: 'type:review-task',
              per_page: 100,
            });

            if (existing.some(i => i.title.includes(`PR #${pr.number}`))) {
              core.info(`Review issue already exists for PR #${pr.number}.`);
              return;
            }

            await github.rest.issues.create({
              owner, repo,
              title: `Review PR #${pr.number}: ${pr.title}`,
              body: [
                `Review this pull request and leave your feedback directly on the PR.`,
                '',
                `**PR:** #${pr.number}`,
                `**Author:** ${pr.user.login}`,
                `**Branch:** \`${pr.head.ref}\` → \`${pr.base.ref}\``,
                '',
                `## Instructions`,
                '',
                `1. Read \`GOVERNANCE.md\` and \`.github/copilot-instructions.md\``,
                `2. Review the PR diff at #${pr.number}`,
                `3. Check for WordPress coding standards, test coverage, backwards compatibility, and security`,
                `4. Leave an approving or change-requesting review on the PR with substantive feedback`,
              ].join('\n'),
              labels: ['agent', 'type:review-task', 'status:ready'],
            });

  close-review-issue:
    runs-on: ubuntu-latest
    concurrency:
      group: agent-review-close-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    if: github.event_name == 'pull_request_review'
    steps:
      - name: Close completed review issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'type:review-task',
              per_page: 100,
            });

            for (const issue of issues) {
              if (issue.title.includes(`PR #${prNumber}`)) {
                await github.rest.issues.update({
                  owner, repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed',
                });
                core.info(`Closed review issue #${issue.number} for PR #${prNumber}`);
              }
            }
