name: Agent Coordinator

on:
  issues:
    types: [labeled]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: agent-coordinator
  cancel-in-progress: true

jobs:
  coordinate:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'status:ready')
    steps:
      - name: Assign ready issues to agents
        uses: actions/github-script@v7
        env:
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check open agent issue count
            const { data: allAgentIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'agent',
              per_page: 100,
            });

            if (allAgentIssues.length >= 20) {
              core.info(`Open agent issues (${allAgentIssues.length}) at limit.`);
              return;
            }

            // Find unassigned status:ready issues
            const { data: readyIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'status:ready',
              per_page: 100,
            });

            const unassigned = readyIssues.filter(i => i.assignees.length === 0);

            if (unassigned.length === 0) {
              core.info('No unassigned ready issues.');
              return;
            }

            // Use PAT for Copilot assignment
            const pat = process.env.COPILOT_PAT;
            if (!pat) {
              const { data: patIssues } = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', per_page: 50,
              });
              const hasAlert = patIssues.some(i => i.title.includes('[CRITICAL] COPILOT_PAT'));
              if (!hasAlert) {
                await github.rest.issues.create({
                  owner, repo,
                  title: '[CRITICAL] COPILOT_PAT secret missing or expired',
                  body: 'The coordinator cannot assign agents because `COPILOT_PAT` is not set or has expired. A maintainer must create a new fine-grained PAT and add it as a repository secret.',
                  labels: ['safety:halt'],
                });
              }
              core.setFailed('COPILOT_PAT not set.');
              return;
            }

            const graphql = async (query) => {
              const res = await fetch('https://api.github.com/graphql', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${pat}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ query }),
              });
              return res.json();
            };

            // Find copilot-swe-agent ID
            const actorsResult = await graphql(`{
              repository(owner: "${owner}", name: "${repo}") {
                suggestedActors(first: 100, capabilities: CAN_BE_ASSIGNED) {
                  nodes {
                    ... on Bot { id login }
                  }
                }
              }
            }`);

            // Check for auth failure
            if (actorsResult?.message === 'Bad credentials' || actorsResult?.errors?.[0]?.type === 'FORBIDDEN') {
              const { data: patIssues } = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', per_page: 50,
              });
              const hasAlert = patIssues.some(i => i.title.includes('[CRITICAL] COPILOT_PAT'));
              if (!hasAlert) {
                await github.rest.issues.create({
                  owner, repo,
                  title: '[CRITICAL] COPILOT_PAT expired or invalid',
                  body: 'The coordinator received an authentication error from the GitHub API. The `COPILOT_PAT` secret needs to be rotated.',
                  labels: ['safety:halt'],
                });
              }
              core.setFailed('COPILOT_PAT authentication failed.');
              return;
            }

            const actors = actorsResult?.data?.repository?.suggestedActors?.nodes || [];
            const copilot = actors.find(a => a.login === 'copilot-swe-agent');

            if (!copilot) {
              const { data: botIssues } = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', per_page: 50,
              });
              const hasAlert = botIssues.some(i => i.title.includes('[CRITICAL] copilot-swe-agent'));
              if (!hasAlert) {
                await github.rest.issues.create({
                  owner, repo,
                  title: '[CRITICAL] copilot-swe-agent not available',
                  body: 'The coordinator cannot find `copilot-swe-agent` as an assignable actor. Verify that GitHub Copilot coding agent is enabled for this repository in the org settings.',
                  labels: ['safety:halt'],
                });
              }
              core.setFailed('copilot-swe-agent not found.');
              return;
            }

            core.info(`Found copilot-swe-agent: ${copilot.id}`);

            // Assign up to 3 issues
            for (const issue of unassigned.slice(0, 3)) {
              try {
                const issueResult = await graphql(`{
                  repository(owner: "${owner}", name: "${repo}") {
                    issue(number: ${issue.number}) {
                      id
                      assignees(first: 50) { nodes { id } }
                    }
                  }
                }`);

                const issueData = issueResult?.data?.repository?.issue;
                if (!issueData) {
                  core.warning(`Could not get details for issue #${issue.number}`);
                  continue;
                }

                const currentAssignees = issueData.assignees.nodes.map(a => a.id);
                if (currentAssignees.includes(copilot.id)) {
                  core.info(`Issue #${issue.number} already assigned to Copilot.`);
                  continue;
                }

                const actorIds = JSON.stringify([copilot.id, ...currentAssignees]);

                const assignResult = await graphql(`
                  mutation {
                    replaceActorsForAssignable(input: {
                      assignableId: "${issueData.id}",
                      actorIds: ${actorIds}
                    }) { __typename }
                  }
                `);

                if (assignResult?.errors) {
                  core.warning(`Failed to assign #${issue.number}: ${assignResult.errors[0].message}`);
                  continue;
                }

                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: issue.number,
                  labels: ['status:in-progress'],
                });

                await github.rest.issues.removeLabel({
                  owner, repo,
                  issue_number: issue.number,
                  name: 'status:ready',
                }).catch(() => {});

                core.info(`Assigned issue #${issue.number} to copilot-swe-agent.`);
              } catch (e) {
                core.warning(`Error on issue #${issue.number}: ${e.message}`);
              }
            }
