name: Coordinator

on:
  issues:
    types: [labeled]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: agent-coordinator
  cancel-in-progress: true

jobs:
  coordinate:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event.label.name == 'status:ready')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read sitrep from Flight Log
        id: read-sitrep
        uses: ./.github/actions/read-from-flight-log
        with:
          category-slug: sitrep
          count: '3'
          wp-url: ${{ secrets.WP_URL }}
          wp-auth: ${{ secrets.WP_AUTH }}

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PAT_APP_ID }}
          private-key: ${{ secrets.PAT_PRIVATE_KEY }}

      - name: Assign ready issues to agents
        uses: actions/github-script@v7
        env:
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          SITREP_CONTEXT: ${{ steps.read-sitrep.outputs.summary }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) {
              core.info('System is off.');
              return;
            }

            // Check open agent issue count
            const { data: allAgentIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'agent',
              per_page: 100,
            });

            if (allAgentIssues.length >= 20) {
              core.info(`Open agent issues (${allAgentIssues.length}) at limit.`);
              return;
            }

            // Backlog backoff: throttle if existing PRs are halted or unstable.
            // A single stuck PR shouldn't freeze the whole system — only block
            // when multiple PRs are halted (systemic failure) or reduce throughput
            // for a single halt. Halts older than 24h are ignored (stale).
            const { data: openPRs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 50,
            });
            const haltedPRs = openPRs.filter(p =>
              p.labels.some(l => l.name === 'safety:halt')
            );
            const freshHalts = haltedPRs.filter(p => {
              const haltAge = Date.now() - new Date(p.updated_at).getTime();
              return haltAge < 24 * 60 * 60 * 1000;
            });
            if (freshHalts.length >= 2) {
              core.info(`Blocking assignment: ${freshHalts.length} PRs halted in the last 24h. Systemic issue — clear those first.`);
              return;
            }
            const throttleForHalt = freshHalts.length === 1;
            if (throttleForHalt) {
              core.info(`1 PR halted — will throttle to 1 assignment this cycle.`);
            }

            // Find unassigned status:ready issues
            const { data: readyIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'status:ready',
              per_page: 100,
            });

            const unassigned = readyIssues.filter(i => i.assignees.length === 0);

            if (unassigned.length === 0) {
              core.info('No unassigned ready issues.');
              return;
            }

            // Use the built-in github.graphql() client (GITHUB_TOKEN, no personal identity)
            const actorsResult = await github.graphql(`{
              repository(owner: "${owner}", name: "${repo}") {
                suggestedActors(first: 100, capabilities: CAN_BE_ASSIGNED) {
                  nodes {
                    ... on Bot { id login }
                  }
                }
              }
            }`);

            const actors = actorsResult?.repository?.suggestedActors?.nodes || [];
            core.info(`Assignable actors: ${actors.map(a => a.login).filter(Boolean).join(', ')}`);

            // Round-robin across available coding agents
            const codingAgents = actors.filter(a =>
              ['anthropic-code-agent', 'openai-code-agent', 'copilot-swe-agent'].includes(a.login)
            );
            // Use current hour as rotation index for simple round-robin
            const rotationIndex = new Date().getHours();
            const agent = codingAgents.length > 0
              ? codingAgents[rotationIndex % codingAgents.length]
              : null;

            if (!agent) {
              const humanTitle = '[Human] No coding agents available — work assignment blocked';
              const { data: botIssues } = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', per_page: 50,
              });
              const hasAlert = botIssues.some(i =>
                i.title === humanTitle || i.title.includes('[CRITICAL] No coding agent')
              );
              if (!hasAlert) {
                await github.rest.issues.create({
                  owner, repo,
                  title: humanTitle,
                  body: [
                    '## What is stuck',
                    'The Coordinator cannot find any assignable coding agent bot. No ready issues can be picked up.',
                    '',
                    '## What the system tried',
                    'Checked for anthropic-code-agent, openai-code-agent, and copilot-swe-agent via suggestedActors.',
                    '',
                    '## What a human should do',
                    '1. Verify coding agents are enabled for this repository in org settings',
                    '2. Check that at least one coding agent is configured',
                  ].join('\n'),
                  labels: ['needs:human', 'agent'],
                });
              }
              core.setFailed('No coding agent found.');
              return;
            }

            // Auto-close agent availability issue if we found one
            const { data: humanIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'needs:human', per_page: 50,
            });
            const agentHuman = humanIssues.find(i => i.title === '[Human] No coding agents available — work assignment blocked');
            if (agentHuman) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: agentHuman.number,
                body: `Coding agent found: ${agent.login}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner, repo, issue_number: agentHuman.number,
                state: 'closed', state_reason: 'completed',
              });
            }

            core.info(`Selected agent: ${agent.login} (${agent.id})`);

            // Use COPILOT_PAT for assignment mutation (required for coding agents)
            // GitHub auto-adds the PAT owner as co-assignee — we remove them after
            const copilotPat = process.env.COPILOT_PAT;
            const appToken = process.env.APP_TOKEN;
            const patGraphql = async (query, variables) => {
              const res = await fetch('https://api.github.com/graphql', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${copilotPat}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ query, variables }),
              });
              return res.json();
            };

            // Identify PAT owner so we can remove them after assignment
            const viewerResult = await patGraphql(`{ viewer { login } }`);
            const patOwner = viewerResult?.data?.viewer?.login;
            if (patOwner) core.info(`Will remove PAT owner (${patOwner}) from assignees after each assignment`);

            // Pace assignments based on system health from Flight Log
            let assignLimit = 2;
            const sitrepContext = process.env.SITREP_CONTEXT || '';
            // If sitrep mentions low approval rate or zero merges, throttle to 1
            if (sitrepContext.match(/approval.*?[0-4]\d%/i) || sitrepContext.match(/merged.*?:?\s*0\b/i)) {
              assignLimit = 1;
              core.info('Throttling to 1 assignment — sitrep shows low velocity.');
            }
            if (throttleForHalt) {
              assignLimit = Math.min(assignLimit, 1);
            }

            // Assign issues
            for (const issue of unassigned.slice(0, assignLimit)) {
              try {
                const issueResult = await github.graphql(`{
                  repository(owner: "${owner}", name: "${repo}") {
                    issue(number: ${issue.number}) {
                      id
                      assignees(first: 50) { nodes { id } }
                    }
                  }
                }`);

                const issueData = issueResult?.repository?.issue;
                if (!issueData) {
                  core.warning(`Could not get details for issue #${issue.number}`);
                  continue;
                }

                const currentAssignees = issueData.assignees.nodes.map(a => a.id);
                if (currentAssignees.includes(agent.id)) {
                  core.info(`Issue #${issue.number} already assigned to ${agent.login}.`);
                  continue;
                }

                const actorIds = JSON.stringify([agent.id, ...currentAssignees]);

                const assignResult = await patGraphql(`
                  mutation($input: ReplaceActorsForAssignableInput!) {
                    replaceActorsForAssignable(input: $input) { __typename }
                  }
                `, {
                  input: {
                    assignableId: issueData.id,
                    actorIds: [agent.id, ...currentAssignees],
                  }
                });

                if (assignResult?.errors) {
                  core.warning(`Failed to assign #${issue.number}: ${assignResult.errors[0].message}`);
                  continue;
                }

                // Remove PAT owner from assignees (GitHub auto-adds them for coding agents)
                if (patOwner) {
                  await fetch(`https://api.github.com/repos/${owner}/${repo}/issues/${issue.number}/assignees`, {
                    method: 'DELETE',
                    headers: {
                      'Authorization': `Bearer ${appToken}`,
                      'Content-Type': 'application/json',
                      'Accept': 'application/vnd.github+json',
                    },
                    body: JSON.stringify({ assignees: [patOwner] }),
                  }).catch(e => core.warning(`Could not remove ${patOwner} from #${issue.number}: ${e.message}`));
                }

                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: issue.number,
                  labels: ['status:in-progress'],
                });

                await github.rest.issues.removeLabel({
                  owner, repo,
                  issue_number: issue.number,
                  name: 'status:ready',
                }).catch(() => {});

                core.info(`Assigned issue #${issue.number} to ${agent.login}.`);
              } catch (e) {
                core.warning(`Error on issue #${issue.number}: ${e.message}`);
              }
            }
