name: Agent Coordinator

on:
  issues:
    types: [labeled]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: agent-coordinator
  cancel-in-progress: true

jobs:
  coordinate:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event.label.name == 'status:ready')
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PAT_APP_ID }}
          private-key: ${{ secrets.PAT_PRIVATE_KEY }}

      - name: Assign ready issues to agents
        uses: actions/github-script@v7
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Kill switch
            const { data: killSwitch } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'system:off', per_page: 1,
            });
            if (killSwitch.length > 0) {
              core.info('System is off.');
              return;
            }

            // Check open agent issue count
            const { data: allAgentIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'agent',
              per_page: 100,
            });

            if (allAgentIssues.length >= 20) {
              core.info(`Open agent issues (${allAgentIssues.length}) at limit.`);
              return;
            }

            // Find unassigned status:ready issues
            const { data: readyIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'status:ready',
              per_page: 100,
            });

            const unassigned = readyIssues.filter(i => i.assignees.length === 0);

            if (unassigned.length === 0) {
              core.info('No unassigned ready issues.');
              return;
            }

            // Use the built-in github.graphql() client (GITHUB_TOKEN, no personal identity)
            const actorsResult = await github.graphql(`{
              repository(owner: "${owner}", name: "${repo}") {
                suggestedActors(first: 100, capabilities: CAN_BE_ASSIGNED) {
                  nodes {
                    ... on Bot { id login }
                  }
                }
              }
            }`);

            const actors = actorsResult?.repository?.suggestedActors?.nodes || [];
            core.info(`Assignable actors: ${actors.map(a => a.login).filter(Boolean).join(', ')}`);

            // Priority order: anthropic, openai, copilot
            const agent =
              actors.find(a => a.login === 'anthropic-code-agent') ||
              actors.find(a => a.login === 'openai-code-agent') ||
              actors.find(a => a.login === 'copilot-swe-agent');

            if (!agent) {
              const { data: botIssues } = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', per_page: 50,
              });
              const hasAlert = botIssues.some(i => i.title.includes('[CRITICAL] No coding agent'));
              if (!hasAlert) {
                await github.rest.issues.create({
                  owner, repo,
                  title: '[CRITICAL] No coding agent available',
                  body: 'The coordinator cannot find any assignable coding agent bot. Verify that coding agents are enabled for this repository in the org settings.',
                  labels: ['safety:halt'],
                });
              }
              core.setFailed('No coding agent found.');
              return;
            }

            core.info(`Selected agent: ${agent.login} (${agent.id})`);

            // App token GraphQL client for mutations (bot identity, no human)
            const appToken = process.env.APP_TOKEN;
            const appGraphql = async (query, variables) => {
              const res = await fetch('https://api.github.com/graphql', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${appToken}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ query, variables }),
              });
              return res.json();
            };

            // Assign up to 3 issues
            for (const issue of unassigned.slice(0, 3)) {
              try {
                const issueResult = await github.graphql(`{
                  repository(owner: "${owner}", name: "${repo}") {
                    issue(number: ${issue.number}) {
                      id
                      assignees(first: 50) { nodes { id } }
                    }
                  }
                }`);

                const issueData = issueResult?.repository?.issue;
                if (!issueData) {
                  core.warning(`Could not get details for issue #${issue.number}`);
                  continue;
                }

                const currentAssignees = issueData.assignees.nodes.map(a => a.id);
                if (currentAssignees.includes(agent.id)) {
                  core.info(`Issue #${issue.number} already assigned to ${agent.login}.`);
                  continue;
                }

                const actorIds = JSON.stringify([agent.id, ...currentAssignees]);

                const assignResult = await appGraphql(`
                  mutation($input: ReplaceActorsForAssignableInput!) {
                    replaceActorsForAssignable(input: $input) { __typename }
                  }
                `, {
                  input: {
                    assignableId: issueData.id,
                    actorIds: [agent.id, ...currentAssignees],
                  }
                });

                if (assignResult?.errors) {
                  core.warning(`Failed to assign #${issue.number}: ${assignResult.errors[0].message}`);
                  continue;
                }

                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: issue.number,
                  labels: ['status:in-progress'],
                });

                await github.rest.issues.removeLabel({
                  owner, repo,
                  issue_number: issue.number,
                  name: 'status:ready',
                }).catch(() => {});

                core.info(`Assigned issue #${issue.number} to ${agent.login}.`);
              } catch (e) {
                core.warning(`Error on issue #${issue.number}: ${e.message}`);
              }
            }
